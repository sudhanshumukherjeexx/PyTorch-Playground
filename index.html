<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyTorch Playground — learn. backpropagate. repeat.</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F9F4;
  --grid:#DCE7ED;
  --grid-strong:#C7D8E2;
  --ink:#22303C;
  --ink-soft:#5C6B77;
  --ink-faint:#8B99A4;
  --ember:#EE4C2C;
  --ember-soft:#FBE3DC;
  --blue:#2B5FD9;
  --blue-soft:#E1E9FB;
  --green:#178A5B;
  --green-soft:#DDF1E7;
  --card:#FFFFFF;
  --code-bg:#20272E;
  --code-ink:#D7E0E8;
  --line:#D3DEE5;
  --shadow:0 1px 2px rgba(34,48,60,.06), 0 8px 24px -12px rgba(34,48,60,.18);
  --r:10px;
  --disp:'Space Grotesk',sans-serif;
  --body:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--body);color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    linear-gradient(var(--grid-strong) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-strong) 1px, transparent 1px);
  background-size:24px 24px,24px 24px,120px 120px,120px 120px;
  font-size:16px;line-height:1.65;
}
::selection{background:var(--ember-soft)}
button{font-family:inherit;cursor:pointer}
a{color:var(--blue)}
.mono{font-family:var(--mono)}

/* ---------- topbar ---------- */
.topbar{
  position:fixed;top:0;left:0;right:0;height:58px;z-index:60;
  background:rgba(247,249,244,.92);backdrop-filter:blur(8px);
  border-bottom:1.5px solid var(--ink);
  display:flex;align-items:center;gap:16px;padding:0 18px;
}
.wordmark{display:flex;align-items:baseline;gap:9px;text-decoration:none;color:var(--ink)}
.wordmark b{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.02em}
.wordmark b em{font-style:normal;color:var(--ember)}
.wordmark span{font-family:var(--mono);font-size:10.5px;font-weight:500;color:var(--ink-faint);letter-spacing:.18em;text-transform:uppercase}
.wordmark span i{font-style:normal;font-weight:600;color:var(--ember)}
@media(max-width:520px){.wordmark span{display:none}}
.menu-btn{display:none;border:1.5px solid var(--ink);background:var(--card);border-radius:8px;width:36px;height:36px;font-size:16px;line-height:1}
.top-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.xp-wrap{display:flex;align-items:center;gap:10px}
.xp-bar{width:150px;height:10px;border:1.5px solid var(--ink);border-radius:99px;background:var(--card);overflow:hidden}
.xp-fill{height:100%;width:0%;background:repeating-linear-gradient(-45deg,var(--ember),var(--ember) 6px,#F97B5F 6px,#F97B5F 12px);transition:width .5s cubic-bezier(.2,.8,.2,1)}
.xp-label{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);white-space:nowrap}
.rank-chip{font-family:var(--mono);font-size:11.5px;font-weight:600;border:1.5px solid var(--ink);border-radius:99px;padding:4px 12px;background:var(--card);white-space:nowrap;box-shadow:2px 2px 0 var(--ink)}
.rank-chip i{font-style:normal;color:var(--ember)}
@media(max-width:900px){.xp-label{display:none}.xp-bar{width:90px}}
@media(max-width:640px){.rank-chip{display:none}}

/* ---------- layout ---------- */
.frame{display:flex;padding-top:58px;min-height:100vh}
.sidebar{
  width:288px;flex-shrink:0;position:sticky;top:58px;height:calc(100vh - 58px);
  overflow-y:auto;border-right:1.5px solid var(--ink);
  background:rgba(255,255,255,.6);padding:18px 14px 60px;
}
.sidebar::-webkit-scrollbar{width:8px}
.sidebar::-webkit-scrollbar-thumb{background:var(--grid-strong);border-radius:4px}
.side-home{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:1.5px solid var(--ink);background:var(--card);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:16px;box-shadow:2px 2px 0 var(--ink);transition:transform .12s}
.side-home:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink)}
.act{margin-bottom:18px}
.act-head{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);padding:0 10px 6px;display:flex;justify-content:space-between;align-items:baseline}
.act-head b{color:var(--ember)}
.ch-link{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;border-radius:8px;padding:7px 10px;font-family:var(--body);font-size:13.5px;color:var(--ink);transition:background .12s}
.ch-link:hover{background:var(--blue-soft)}
.ch-link.active{background:var(--ink);color:#fff}
.ch-link.active .ch-num{color:#F9B4A4}
.ch-num{font-family:var(--mono);font-size:11px;color:var(--ink-faint);width:20px;flex-shrink:0}
.ch-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--ink-faint);flex-shrink:0;margin-left:auto}
.ch-link.active .ch-dot{border-color:#fff}
.ch-dot.done{background:var(--green);border-color:var(--green)}
.ch-title-s{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.main{flex:1;min-width:0;padding:36px 44px 120px;max-width:1060px;margin:0 auto}
@media(max-width:980px){
  .menu-btn{display:block}
  .sidebar{position:fixed;left:0;top:58px;z-index:50;transform:translateX(-102%);transition:transform .25s;background:var(--paper);box-shadow:var(--shadow)}
  .sidebar.open{transform:translateX(0)}
  .main{padding:24px 18px 100px}
}

/* ---------- typography / content ---------- */
.eyebrow{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ember);display:flex;align-items:center;gap:10px}
.eyebrow::after{content:"";height:1.5px;width:56px;background:var(--ember)}
h1.ch-h{font-family:var(--disp);font-weight:700;font-size:clamp(30px,4.4vw,44px);line-height:1.08;letter-spacing:-.015em;margin:10px 0 8px}
.ch-sub{font-size:17px;color:var(--ink-soft);max-width:62ch}
.ch-meta{display:flex;gap:16px;margin-top:14px;font-family:var(--mono);font-size:12px;color:var(--ink-soft);flex-wrap:wrap}
.ch-meta span b{color:var(--ink)}
h2.sec-h{font-family:var(--disp);font-weight:600;font-size:24px;letter-spacing:-.01em;margin:44px 0 12px;display:flex;align-items:baseline;gap:12px}
h2.sec-h .sec-idx{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ember)}
.prose p{margin:0 0 14px;max-width:72ch}
.prose ul,.prose ol{margin:0 0 14px 22px;max-width:70ch}
.prose li{margin-bottom:6px}
.prose code{font-family:var(--mono);font-size:.86em;background:var(--blue-soft);border-radius:4px;padding:1px 5px;color:#1E4094}
.prose strong{font-weight:600}
.gotcha{border:1.5px solid var(--ink);border-left:6px solid var(--ember);background:var(--card);border-radius:var(--r);padding:14px 16px;margin:18px 0;max-width:72ch;box-shadow:var(--shadow)}
.gotcha .g-tag{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--ember);text-transform:uppercase;display:block;margin-bottom:4px}
.gotcha p{margin:0}
.whybox{border:1.5px solid var(--ink);border-left:6px solid var(--green);background:var(--card);border-radius:var(--r);padding:14px 16px;margin:18px 0;max-width:72ch;box-shadow:var(--shadow)}
.whybox .g-tag{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--green);text-transform:uppercase;display:block;margin-bottom:4px}
.whybox p{margin:0}

/* ---------- code ---------- */
.codecard{position:relative;background:var(--code-bg);border:1.5px solid var(--ink);border-radius:var(--r);margin:16px 0 20px;box-shadow:4px 4px 0 var(--ink);overflow:hidden}
.codecard .cc-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #333E48}
.cc-dots{display:flex;gap:5px}
.cc-dots i{width:9px;height:9px;border-radius:50%;background:#3B4854;display:block}
.cc-name{font-family:var(--mono);font-size:11px;color:#93A3B1;margin-left:4px}
.cc-copy{margin-left:auto;font-family:var(--mono);font-size:11px;color:#B9C6D1;background:#2C353E;border:1px solid #3D4954;border-radius:6px;padding:3px 10px;transition:background .12s}
.cc-copy:hover{background:#38434D}
.cc-copy.ok{color:#7BE0B0;border-color:#2E6B4F}
pre.code{overflow-x:auto;padding:14px 16px;font-family:var(--mono);font-size:13px;line-height:1.62;color:var(--code-ink)}
pre.code::-webkit-scrollbar{height:8px}
pre.code::-webkit-scrollbar-thumb{background:#3B4854;border-radius:4px}
.tk-k{color:#F58C74}      /* keyword */
.tk-s{color:#9ED89B}      /* string */
.tk-c{color:#7A8894;font-style:italic} /* comment */
.tk-n{color:#8FC7FF}      /* number */
.tk-t{color:#F5C97B}      /* torch/nn */
.tk-d{color:#C9A7F5}      /* decorator */
.code-cap{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin:-12px 0 20px;padding-left:4px}

/* ---------- labs (widgets) ---------- */
.lab{border:1.5px solid var(--ink);border-radius:14px;background:var(--card);box-shadow:5px 5px 0 var(--ink);margin:26px 0;overflow:hidden}
.lab-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1.5px solid var(--ink);background:linear-gradient(0deg,var(--ember-soft),var(--ember-soft))}
.lab-bar .lab-flame{font-size:15px}
.lab-bar b{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.01em}
.lab-bar span{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-left:auto;text-transform:uppercase;letter-spacing:.1em}
.lab-body{padding:18px}
.lab-note{font-size:13.5px;color:var(--ink-soft);margin-bottom:14px;max-width:70ch}
.ctrl-row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:14px}
.ctrl{display:flex;flex-direction:column;gap:4px}
.ctrl label{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
.ctrl select,.ctrl input[type=text]{font-family:var(--mono);font-size:13px;border:1.5px solid var(--ink);border-radius:7px;padding:6px 9px;background:#fff;color:var(--ink)}
.ctrl input[type=range]{accent-color:var(--ember);width:150px}
.btn{font-family:var(--mono);font-size:12.5px;font-weight:600;border:1.5px solid var(--ink);border-radius:8px;padding:8px 14px;background:var(--ink);color:#fff;box-shadow:2px 2px 0 rgba(34,48,60,.35);transition:transform .1s}
.btn:hover{transform:translate(-1px,-1px)}
.btn:active{transform:translate(1px,1px);box-shadow:none}
.btn.ghost{background:#fff;color:var(--ink)}
.btn.ember{background:var(--ember);border-color:var(--ink)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.readout{font-family:var(--mono);font-size:12.5px;background:var(--paper);border:1.5px dashed var(--grid-strong);border-radius:8px;padding:8px 12px}
.readout b{color:var(--ember)}

/* tensor lab grids */
.shape-viz{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-end;margin-top:6px}
.sgrid{display:grid;gap:3px}
.sgrid i{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--ink);display:block}
.sgrid i.a{background:var(--blue-soft)}
.sgrid i.b{background:var(--ember-soft)}
.sgrid i.o{background:var(--green-soft)}
.sgrid i.ghost{opacity:.28;border-style:dashed}
.sg-label{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);margin-top:6px;text-align:center}
.bcast-msg{font-family:var(--mono);font-size:13px;margin-top:12px;padding:10px 12px;border-radius:8px;border:1.5px solid var(--ink)}
.bcast-msg.ok{background:var(--green-soft)}
.bcast-msg.err{background:var(--ember-soft)}

/* autograd tape */
.tape-svg{width:100%;height:auto;display:block}
.node-rect{fill:#fff;stroke:var(--ink);stroke-width:1.5;rx:9}
.node-op{fill:var(--blue-soft)}
.node-loss{fill:var(--ember-soft)}
.node-name{font-family:var(--mono);font-size:11px;fill:var(--ink-soft)}
.node-val{font-family:var(--mono);font-size:14px;font-weight:600;fill:var(--ink)}
.grad-chip{font-family:var(--mono);font-size:10.5px;font-weight:600;fill:var(--ember);opacity:0;transition:opacity .4s}
.grad-chip.show{opacity:1}
.edge{stroke:var(--ink);stroke-width:1.5;fill:none}
.edge-back{stroke:var(--ember);stroke-width:2;stroke-dasharray:5 5;fill:none;opacity:0;transition:opacity .4s}
.edge-back.show{opacity:1;animation:march 1s linear infinite}
@keyframes march{to{stroke-dashoffset:-20}}

/* train arena */
.arena{display:grid;grid-template-columns:minmax(240px,300px) 1fr;gap:18px}
@media(max-width:820px){.arena{grid-template-columns:1fr}}
.arena canvas{width:100%;border:1.5px solid var(--ink);border-radius:10px;display:block;background:#fff;image-rendering:auto}
.loss-canvas{margin-top:10px}
.stat-strip{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.stat{font-family:var(--mono);font-size:12px;border:1.5px solid var(--ink);border-radius:8px;padding:6px 10px;background:var(--paper)}
.stat b{color:var(--ember)}
.mirror-code{margin-top:0}

/* conv lab */
.conv-wrap{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
.pix-grid{display:grid;gap:2px}
.pix-grid i{width:22px;height:22px;border-radius:3px;display:block;border:1px solid rgba(34,48,60,.18)}
.pix-grid i.hot{outline:2.5px solid var(--ember);outline-offset:-1px;z-index:2}
.conv-sum{font-family:var(--mono);font-size:12.5px;margin-top:10px;min-height:22px;color:var(--ink-soft)}
.kern-grid{display:grid;grid-template-columns:repeat(3,34px);gap:3px}
.kern-grid i{height:34px;border:1.5px solid var(--ink);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;background:#fff}

/* attention lab */
.tok-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 16px}
.tok{font-family:var(--mono);font-size:14px;border:1.5px solid var(--ink);border-radius:8px;padding:7px 12px;background:#fff;transition:all .15s;position:relative}
.tok:hover{transform:translateY(-2px)}
.tok.sel{background:var(--ink);color:#fff;box-shadow:2px 2px 0 var(--ember)}
.attn-bars{display:flex;gap:8px;align-items:flex-end;height:120px;margin-top:8px;flex-wrap:wrap}
.abar{display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end;height:100%}
.abar .bar{width:34px;background:var(--ember);border:1.5px solid var(--ink);border-radius:5px 5px 0 0;transition:height .35s cubic-bezier(.2,.8,.2,1);min-height:2px}
.abar .bl{font-family:var(--mono);font-size:10px;color:var(--ink-soft)}

/* quiz */
.quiz{border:1.5px solid var(--ink);border-radius:14px;background:var(--card);box-shadow:5px 5px 0 var(--ink);margin:34px 0;overflow:hidden}
.quiz-bar{padding:10px 16px;border-bottom:1.5px solid var(--ink);background:var(--blue-soft);display:flex;align-items:center;gap:10px}
.quiz-bar b{font-family:var(--disp);font-weight:600;font-size:15px}
.quiz-bar span{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-left:auto;letter-spacing:.1em;text-transform:uppercase}
.qq{padding:16px 18px;border-bottom:1px dashed var(--line)}
.qq:last-child{border-bottom:none}
.qq-q{font-weight:600;margin-bottom:10px;display:flex;gap:8px}
.qq-q .qn{font-family:var(--mono);color:var(--ember);font-weight:600}
.opt{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;margin-bottom:7px;cursor:pointer;font-size:14.5px;transition:border-color .12s,background .12s}
.opt:hover{border-color:var(--ink)}
.opt input{margin-top:3px;accent-color:var(--ember)}
.opt.right{border-color:var(--green);background:var(--green-soft)}
.opt.wrong{border-color:var(--ember);background:var(--ember-soft)}
.qq-why{font-size:13.5px;color:var(--ink-soft);border-left:3px solid var(--green);padding:4px 10px;margin-top:8px;display:none}
.qq-why.show{display:block}
.quiz-foot{padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.quiz-score{font-family:var(--mono);font-size:13px}

/* pager + complete */
.ch-foot{margin-top:44px;display:flex;flex-direction:column;gap:16px}
.complete-btn{align-self:flex-start}
.pager{display:flex;gap:14px;flex-wrap:wrap}
.pg{flex:1;min-width:220px;border:1.5px solid var(--ink);border-radius:12px;background:var(--card);padding:12px 16px;text-align:left;box-shadow:3px 3px 0 var(--ink);transition:transform .12s;font-family:var(--body)}
.pg:hover{transform:translate(-2px,-2px)}
.pg small{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);display:block}
.pg b{font-family:var(--disp);font-size:15.5px}
.pg.next{text-align:right}

/* ---------- home ---------- */
.hero{padding:26px 0 8px}
.hero-kicker{font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ember);display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--ink);background:var(--card);border-radius:99px;padding:5px 14px;box-shadow:2px 2px 0 var(--ink)}
.hero h1{font-family:var(--disp);font-weight:700;font-size:clamp(38px,6vw,66px);line-height:1.02;letter-spacing:-.02em;margin:20px 0 14px;max-width:16ch}
.hero h1 .u{box-shadow:inset 0 -.28em 0 var(--ember-soft)}
.hero p.lead{font-size:18px;color:var(--ink-soft);max-width:58ch}
.hero p.lead b{color:var(--ink)}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;margin-top:20px}
.act-card{border:1.5px solid var(--ink);border-radius:14px;background:var(--card);padding:16px;box-shadow:4px 4px 0 var(--ink);cursor:pointer;text-align:left;transition:transform .12s;font-family:var(--body)}
.act-card:hover{transform:translate(-2px,-2px)}
.act-card small{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ember);font-weight:600}
.act-card h3{font-family:var(--disp);font-size:18px;margin:5px 0 6px}
.act-card p{font-size:13.5px;color:var(--ink-soft)}
.act-card .cnt{font-family:var(--mono);font-size:11px;color:var(--ink-faint);display:block;margin-top:10px}
.how-strip{display:flex;gap:0;margin:38px 0 10px;border:1.5px solid var(--ink);border-radius:14px;overflow:hidden;background:var(--card);box-shadow:4px 4px 0 var(--ink);flex-wrap:wrap}
.how{flex:1;min-width:170px;padding:16px;border-right:1.5px dashed var(--line)}
.how:last-child{border-right:none}
.how b{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ember)}
.how h4{font-family:var(--disp);font-size:16px;margin:4px 0 4px}
.how p{font-size:13px;color:var(--ink-soft)}
.session-note{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);margin-top:26px}
h2.home-h{font-family:var(--disp);font-weight:600;font-size:22px;margin:40px 0 4px}
.home-sub{color:var(--ink-soft);font-size:14.5px}
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
:focus-visible{outline:2.5px solid var(--blue);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>

<header class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="Toggle curriculum">☰</button>
  <a class="wordmark" href="#/" aria-label="PyTorch Playground home">
    <b>PyTorch<em>▲</em>Playground</b><span>learn. <i>backpropagate.</i> repeat.</span>
  </a>
  <div class="top-right">
    <div class="xp-wrap" title="XP earned this session">
      <span class="xp-label" id="xpLabel">0 XP</span>
      <div class="xp-bar" role="progressbar" aria-label="XP progress to next rank"><div class="xp-fill" id="xpFill"></div></div>
    </div>

/* ---------- python syntax highlighter (curated-source safe) ---------- */
const PY_KW = /\b(def|class|return|import|from|as|for|in|if|elif|else|while|with|try|except|finally|lambda|yield|pass|break|continue|not|and|or|is|None|True|False|raise|assert|global|del|async|await)\b/g;
function hl(src){
  const lines = src.split('\n').map(line=>{
    let s = esc(line);
    const stash=[];
    // strings first
    s = s.replace(/(&quot;.*?&quot;|&#x27;.*?&#x27;|"[^"]*"|'[^']*')/g, m=>{stash.push('<span class="tk-s">'+m+'</span>');return '\x00'+(stash.length-1)+'\x00';});
    // comment
    s = s.replace(/(#.*)$/, m=>{stash.push('<span class="tk-c">'+m+'</span>');return '\x00'+(stash.length-1)+'\x00';});
    s = s.replace(/(@[\w.]+)/g,'<span class="tk-d">$1</span>');
    s = s.replace(PY_KW,'<span class="tk-k">$1</span>');
    s = s.replace(/\b(torch|nn|F|optim|dist|autograd|torchvision|Tensor|DataLoader|Dataset|cuda|pl|mps)\b/g,'<span class="tk-t">$1</span>');
    s = s.replace(/\b(\d+\.?\d*(?:e-?\d+)?)\b/g,'<span class="tk-n">$1</span>');
    s = s.replace(/\x00(\d+)\x00/g,(_,i)=>stash[+i]);
    return s;
  });

}

/* =====================================================

function broadcastShapes(a,b){
  const A=[...a].reverse(),B=[...b].reverse(),out=[];
  const n=Math.max(A.length,B.length);
  for(let i=0;i<n;i++){
    const x=A[i]??1,y=B[i]??1;
    if(x===y||x===1||y===1) out.push(Math.max(x,y));
    else return {ok:false,dim:n-1-i,x,y};
  }
  return {ok:true,shape:out.reverse()};
}
function mountTensorLab(host){

    <div class="ctrl-row">
      <div class="ctrl"><label for="shA">tensor a — shape</label><input type="text" id="shA" value="3, 1" size="10"></div>

  function grid(r,c,cls,ghostMask){
    let h=`<div class="sgrid" style="grid-template-columns:repeat(${c},20px)">`;
    for(let i=0;i<r;i++)for(let j=0;j<c;j++){

    const r=broadcastShapes(a,b);

        <div style="font-family:var(--mono);font-size:20px;padding-bottom:24px">+</div>
        <div><div>${grid(or_,oc,'b',(i,j)=>i>=br||j>=bc)}</div><div class="sg-label">b (${b.join(',')}) stretched</div></div>
        <div style="font-family:var(--mono);font-size:20px;padding-bottom:24px">=</div>

/* =====================================================
   LAB 2 — The Autograd Tape (live computational graph)
   L = (w·x + b − t)²   with x=2, t=6

function mountTapeLab(host,{hero=false}={}){
  const X=2,T=6;
  host.innerHTML=`
  <div class="lab"><div class="lab-bar"><span class="lab-flame">▲</span><b>Lab · The Autograd Tape</b><span>live</span></div>
  <div class="lab-body">
    <p class="lab-note">${hero
      ?'This is a real computational graph for <span class="mono">loss = (w·x + b − t)²</span> with x=2, target t=6. Drag the weights — it recomputes forward instantly. Then call <span class="mono">.backward()</span> to watch gradients flow right-to-left, and <span class="mono">optimizer.step()</span> to descend.'
      :'One neuron, one loss. Every slider move is a forward pass. <span class="mono">backward()</span> replays the tape in reverse, chain rule at every node. <span class="mono">step()</span> nudges w and b against their gradients — this is the entire secret of deep learning.'}</p>
    <div class="ctrl-row">
      <div class="ctrl"><label>w = <span class="wv mono"></span></label><input type="range" class="rw" min="-3" max="3" step="0.05" value="-1"></div>
      <div class="ctrl"><label>b = <span class="bv mono"></span></label><input type="range" class="rb" min="-4" max="4" step="0.05" value="0.5"></div>
      <button class="btn ember bw">loss.backward()</button>
      <button class="btn stp" disabled>optimizer.step()  lr=0.1</button>
      <button class="btn ghost zg">zero_grad()</button>
    </div>
    <svg class="tape-svg" viewBox="0 0 760 240" role="img" aria-label="Computational graph of a one-neuron loss">
      <defs><marker id="arr${hero?'H':'C'}" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#22303C"/></marker></defs>
      <g class="edges"></g><g class="backedges"></g><g class="nodes"></g>
    </svg>
    <div class="readout tape-read" style="margin-top:8px"></div>
  </div></div>`;
  const svg=$('svg',host);
  const NODES=[
    {id:'w', x:30,  y:30,  name:'w · leaf',  cls:''},
    {id:'x', x:30,  y:100, name:'x = 2',     cls:''},
    {id:'b', x:30,  y:170, name:'b · leaf',  cls:''},
    {id:'m', x:230, y:65,  name:'mul',       cls:'node-op'},
    {id:'z', x:400, y:100, name:'add',       cls:'node-op'},
    {id:'e', x:545, y:100, name:'sub t=6',   cls:'node-op'},
    {id:'L', x:672, y:100, name:'pow 2 → L', cls:'node-loss'},
  ];
  const EDGES=[['w','m'],['x','m'],['b','z'],['m','z'],['z','e'],['e','L']];
  const P={}; NODES.forEach(n=>P[n.id]=n);
  const W=78,H=52;
  const path=(a,b)=>{const A=P[a],B=P[b];const x1=A.x+W,y1=A.y+H/2,x2=B.x,y2=B.y+H/2;const mx=(x1+x2)/2;return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;};
  $('.edges',svg).innerHTML=EDGES.map(([a,b])=>`<path class="edge" marker-end="url(#arr${hero?'H':'C'})" d="${path(a,b)}"/>`).join('');
  $('.backedges',svg).innerHTML=EDGES.map(([a,b])=>`<path class="edge-back be-${a}" d="${path(a,b)}"/>`).join('');
  $('.nodes',svg).innerHTML=NODES.map(n=>`
    <g transform="translate(${n.x},${n.y})">
      <rect class="node-rect ${n.cls}" width="${W}" height="${H}" rx="9"/>
      <text class="node-name" x="8" y="16">${n.name}</text>
      <text class="node-val nv-${n.id}" x="8" y="38">0</text>
      <text class="grad-chip gc-${n.id}" x="8" y="${H+16}">∇ 0</text>
    </g>`).join('');
  const rw=$('.rw',host),rb=$('.rb',host),bw=$('.bw',host),stp=$('.stp',host),zg=$('.zg',host);
  let grads=null;
  function fwd(){
    const w=+rw.value,b=+rb.value;
    const m=w*X, z=m+b, e=z-T, L=e*e;
    $('.wv',host).textContent=fmt(w,2); $('.bv',host).textContent=fmt(b,2);
    const set=(id,v)=>$('.nv-'+id,svg).textContent=fmt(v,2);
    set('w',w);set('x',X);set('b',b);set('m',m);set('z',z);set('e',e);set('L',L);
    $('.tape-read',host).innerHTML=`forward: loss = (${fmt(w,2)}·2 + ${fmt(b,2)} − 6)² = <b>${fmt(L,3)}</b>${grads?` &nbsp;·&nbsp; grads: ∂L/∂w=<b>${fmt(grads.w,3)}</b>, ∂L/∂b=<b>${fmt(grads.b,3)}</b>`:' — call backward() to get gradients'}`;
    return {w,b,m,z,e,L};
  }
  function clearGrads(){
    grads=null; stp.disabled=true;
    $$('.grad-chip',svg).forEach(g=>g.classList.remove('show'));
    $$('.edge-back',svg).forEach(g=>g.classList.remove('show'));
    fwd();
  }
  function backward(){
    const {e}=fwd();
    const dE=2*e;                    // ∂L/∂e
    grads={L:1,e:dE,z:dE,m:dE,b:dE,w:dE*X,x:dE*(+rw.value)};
    const order=['L','e','z','m','b','w','x'];
    order.forEach((id,i)=>setTimeout(()=>{
      const c=$('.gc-'+id,svg); c.textContent='∇ '+fmt(grads[id],3); c.classList.add('show');
      EDGES.filter(E=>E[0]===id).forEach(()=>$('.be-'+id,svg)?.classList.add('show'));
    }, 240*i));
    setTimeout(()=>{stp.disabled=false;fwd();}, 240*order.length);
  }
  rw.addEventListener('input',()=>{clearGrads();});
  rb.addEventListener('input',()=>{clearGrads();});
  bw.addEventListener('click',backward);
  zg.addEventListener('click',clearGrads);
  stp.addEventListener('click',()=>{
    if(!grads) return;
    rw.value=(+rw.value-0.1*grads.w).toFixed(3);
    rb.value=(+rb.value-0.1*grads.b).toFixed(3);
    clearGrads(); backward();
  });
  fwd();
}

/* =====================================================
   LAB 3 — Training Arena (real MLP + backprop in JS)
   ===================================================== */
function makeData(kind,n=240){
  const pts=[];const R=()=>Math.random()*2-1;
  for(let i=0;i<n;i++){
    let x,y,l;
    if(kind==='circles'){
      const inner=i%2===0;
      const r=inner?Math.random()*0.9:1.6+Math.random()*0.8;
      const a=Math.random()*Math.PI*2;
      x=r*Math.cos(a)/2.6; y=r*Math.sin(a)/2.6; l=inner?1:0;
    }else if(kind==='xor'){
      x=R()*0.9; y=R()*0.9; l=(x*y>0)?1:0;
      x+=R()*0.05; y+=R()*0.05;
    }else if(kind==='moons'){
      const up=i%2===0; const a=Math.random()*Math.PI;
      if(up){x=Math.cos(a)*0.6-0.25;y=Math.sin(a)*0.6-0.15;l=1;}
      else{x=0.25-Math.cos(a)*0.6;y=0.25-Math.sin(a)*0.6;l=0;}
      x+=R()*0.05;y+=R()*0.05;
    }else{ // spiral
      const arm=i%2; const t=(i/n)*3.2*Math.PI+0.4;
      const r=t/(3.6*Math.PI);
      const s=arm?0:Math.PI;
      x=r*Math.cos(t+s); y=r*Math.sin(t+s); l=arm;
      x+=R()*0.02;y+=R()*0.02;
    }
    pts.push([x,y,l]);
  }
  return pts;
}
class MLP{
  constructor(h,act){this.h=h;this.act=act;this.init();}
  init(){
    const rnd=(n,scale)=>Float64Array.from({length:n},()=>(Math.random()*2-1)*scale);
    const s1=Math.sqrt(2/2),s2=Math.sqrt(2/this.h),s3=Math.sqrt(2/this.h);
    this.W1=rnd(this.h*2,s1); this.b1=new Float64Array(this.h);
    this.W2=rnd(this.h*this.h,s2); this.b2=new Float64Array(this.h);
    this.W3=rnd(this.h,s3); this.b3=new Float64Array(1);
  }
  actF(v){return this.act==='relu'?Math.max(0,v):Math.tanh(v);}
  actG(v,a){return this.act==='relu'?(v>0?1:0):1-a*a;}
  forward(x,y,cache){
    const h=this.h;
    const z1=new Float64Array(h),a1=new Float64Array(h);
    for(let i=0;i<h;i++){z1[i]=this.W1[i*2]*x+this.W1[i*2+1]*y+this.b1[i];a1[i]=this.actF(z1[i]);}
    const z2=new Float64Array(h),a2=new Float64Array(h);
    for(let i=0;i<h;i++){let s=this.b2[i];for(let j=0;j<h;j++)s+=this.W2[i*h+j]*a1[j];z2[i]=s;a2[i]=this.actF(s);}
    let z3=this.b3[0];for(let i=0;i<h;i++)z3+=this.W3[i]*a2[i];
    const p=1/(1+Math.exp(-z3));
    if(cache){cache.z1=z1;cache.a1=a1;cache.z2=z2;cache.a2=a2;cache.p=p;cache.x=x;cache.y=y;}
    return p;
  }
  trainEpoch(data,lr){
    const h=this.h;
    const gW1=new Float64Array(h*2),gb1=new Float64Array(h);
    const gW2=new Float64Array(h*h),gb2=new Float64Array(h);
    const gW3=new Float64Array(h);let gb3=0;
    let loss=0,correct=0;const c={};
    for(const [x,y,t] of data){
      const p=this.forward(x,y,c);
      const eps=1e-7;
      loss+=-(t*Math.log(p+eps)+(1-t)*Math.log(1-p+eps));
      if((p>0.5?1:0)===t)correct++;
      const d3=p-t;                        // ∂L/∂z3 (BCE + sigmoid)
      gb3+=d3;
      const d2=new Float64Array(h);
      for(let i=0;i<h;i++){gW3[i]+=d3*c.a2[i];d2[i]=d3*this.W3[i]*this.actG(c.z2[i],c.a2[i]);}
      const d1=new Float64Array(h);
      for(let i=0;i<h;i++){
        gb2[i]+=d2[i];
        for(let j=0;j<h;j++){gW2[i*h+j]+=d2[i]*c.a1[j];d1[j]+=d2[i]*this.W2[i*h+j];}
      }
      for(let j=0;j<h;j++){
        d1[j]*=this.actG(c.z1[j],c.a1[j]);
        gb1[j]+=d1[j];gW1[j*2]+=d1[j]*x;gW1[j*2+1]+=d1[j]*y;
      }
    }
    const n=data.length,k=lr/n;
    for(let i=0;i<this.W1.length;i++)this.W1[i]-=k*gW1[i];
    for(let i=0;i<h;i++)this.b1[i]-=k*gb1[i];
    for(let i=0;i<this.W2.length;i++)this.W2[i]-=k*gW2[i];
    for(let i=0;i<h;i++)this.b2[i]-=k*gb2[i];
    for(let i=0;i<h;i++)this.W3[i]-=k*gW3[i];
    this.b3[0]-=k*gb3;
    return {loss:loss/n,acc:correct/n};
  }
}
function mountArena(host){

`import torch, torch.nn as nn

model = nn.Sequential(
    nn.Linear(2, ${h}),

)

for epoch in range(2000):
    logits = model(X)                # X: [${S.data.length}, 2]
    loss   = loss_fn(logits, y)      # y: [${S.data.length}, 1]
    optimizer.zero_grad()
    loss.backward()                  # what this page just did
    optimizer.step()`,'your_settings.py');
  }
  function reset(){
    S.net=new MLP(getH(),getAct()); S.epoch=0; S.losses=[];
    $('.hv',host).textContent='('+getH()+')';
    $('.lv',host).textContent='('+getLR().toFixed(3)+')';
    mirror(); drawAll(true);
    $('.ep',host).textContent=0; $('.lo',host).textContent='—'; $('.acs',host).textContent='—';
  }
  const toPx=v=>(v+1.15)/2.3*300;
  function drawBoundary(){
    const img=ctx.createImageData(60,60);
    for(let iy=0;iy<60;iy++)for(let ix=0;ix<60;ix++){
      const x=ix/60*2.3-1.15, y=1.15-iy/60*2.3;
      const p=S.net.forward(x,y,null);
      const i=(iy*60+ix)*4;
      // blend blue(0) → white → ember(1)
      const t=p;
      img.data[i]  = t<0.5 ? 225-(0.5-t)*2*(225-165) : 225+(t-0.5)*2*(251-225);
      img.data[i+1]= t<0.5 ? 233-(0.5-t)*2*(233-190) : 233-(t-0.5)*2*(233-198);
      img.data[i+2]= t<0.5 ? 251 : 251-(t-0.5)*2*(251-186);
      img.data[i+3]=255;
    }
    const tmp=document.createElement('canvas');tmp.width=60;tmp.height=60;
    tmp.getContext('2d').putImageData(img,0,0);
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(tmp,0,0,300,300);
  }
  function drawPoints(){
    for(const [x,y,l] of S.data){
      ctx.beginPath();ctx.arc(toPx(x),(1.15-y)/2.3*300,3.4,0,7);
      ctx.fillStyle=l?'#EE4C2C':'#2B5FD9';ctx.fill();
      ctx.strokeStyle='#22303C';ctx.lineWidth=1;ctx.stroke();
    }
  }
  function drawLoss(){
    lctx.clearRect(0,0,300,70);
    lctx.strokeStyle='#D3DEE5';lctx.strokeRect(0.5,0.5,299,69);
    if(S.losses.length<2)return;
    const max=Math.max(...S.losses,0.75);
    lctx.beginPath();lctx.strokeStyle='#EE4C2C';lctx.lineWidth=2;
    S.losses.forEach((L,i)=>{
      const x=i/(S.losses.length-1)*296+2, y=68-(L/max)*62;
      i?lctx.lineTo(x,y):lctx.moveTo(x,y);
    });
    lctx.stroke();
    lctx.fillStyle='#5C6B77';lctx.font='10px IBM Plex Mono';
    lctx.fillText('loss',6,14);
  }
  function drawAll(){drawBoundary();drawPoints();drawLoss();}
  function frame(){
    if(!S.playing)return;
    let last;
    for(let i=0;i<6;i++){last=S.net.trainEpoch(S.data,getLR());S.epoch++;}
    S.losses.push(last.loss); if(S.losses.length>240)S.losses.shift();
    $('.ep',host).textContent=S.epoch;
    $('.lo',host).textContent=last.loss.toFixed(4);
    $('.acs',host).textContent=(last.acc*100).toFixed(1)+'%';
    drawAll();
    requestAnimationFrame(frame);
  }
  $('.play',host).addEventListener('click',e=>{
    S.playing=!S.playing;
    e.target.textContent=S.playing?'❚❚ pause':'▶ train';
    if(S.playing)requestAnimationFrame(frame);
  });
  $('.rst',host).addEventListener('click',reset);
  $('.ds',host).addEventListener('change',e=>{S.data=makeData(e.target.value);reset();});
  $('.hu',host).addEventListener('input',reset);
  $('.ac',host).addEventListener('change',reset);
  $('.lr',host).addEventListener('input',()=>{$('.lv',host).textContent='('+getLR().toFixed(3)+')';mirror();});
  reset();
}

/* =====================================================
   LAB 4 — Convolution, one stride at a time
   ===================================================== */
const CONV_PATTERNS={
  cross:  (i,j)=>(i===4||i===5||j===4||j===5)?1:0,
  diagonal:(i,j)=>Math.abs(i-j)<=1?1:0,
  square: (i,j)=>(i>=2&&i<=7&&j>=2&&j<=7&&(i===2||i===7||j===2||j===7))?1:0,
  blob:   (i,j)=>{const d=Math.hypot(i-4.5,j-4.5);return d<3?1-d/3.4:0;}
};
const KERNELS={
  'sobel-x':  {k:[-1,0,1,-2,0,2,-1,0,1],why:'lights up where brightness changes left→right: vertical edges.'},
  'sobel-y':  {k:[-1,-2,-1,0,0,0,1,2,1],why:'lights up where brightness changes top→bottom: horizontal edges.'},
  'blur':     {k:[1/9,1/9,1/9,1/9,1/9,1/9,1/9,1/9,1/9],why:'averages the neighbourhood — high frequencies die.'},
  'sharpen':  {k:[0,-1,0,-1,5,-1,0,-1,0],why:'amplifies the centre against its neighbours — edges pop.'},
};
function mountConvLab(host){
  host.innerHTML=`
  <div class="lab"><div class="lab-bar"><span class="lab-flame">▲</span><b>Lab · One Stride at a Time</b><span>conv2d</span></div>
  <div class="lab-body">
    <p class="lab-note">A 3×3 kernel slides across a 10×10 input (stride 1, no padding → 8×8 output). Each output pixel is one multiply-accumulate of the highlighted window. This is all <span class="mono">nn.Conv2d</span> does — except the kernel values are <strong>learned</strong>.</p>
    <div class="ctrl-row">
      <div class="ctrl"><label>input</label><select class="pt"><option>cross</option><option>diagonal</option><option>square</option><option>blob</option></select></div>
      <div class="ctrl"><label>kernel</label><select class="kn"><option>sobel-x</option><option>sobel-y</option><option>blur</option><option>sharpen</option></select></div>
      <button class="btn ember run">▶ slide</button>
      <button class="btn ghost stepb">step</button>
    </div>
    <div class="conv-wrap">
      <div><div class="pix-grid ig" style="grid-template-columns:repeat(10,22px)"></div><div class="sg-label">input 10×10</div></div>
      <div><div class="kern-grid kg"></div><div class="sg-label">kernel 3×3</div><div class="conv-sum cs"></div></div>
      <div><div class="pix-grid og" style="grid-template-columns:repeat(8,22px)"></div><div class="sg-label">output 8×8</div></div>
    </div>
    <div class="readout kwhy" style="margin-top:14px"></div>
  </div></div>`;
  const ig=$('.ig',host),og=$('.og',host),kg=$('.kg',host);
  let input=[],out=[],pos=-1,timer=null;
  const gray=v=>{const c=Math.round(240-Math.min(1,Math.max(0,v))*205);return `rgb(${c},${c+4},${c+8})`;};
  const diverge=v=>{ // negative blue, positive ember
    const t=Math.max(-1,Math.min(1,v/4));
    return t>=0?`rgba(238,76,44,${Math.abs(t)})`:`rgba(43,95,217,${Math.abs(t)})`;
  };
  function build(){
    clearInterval(timer);pos=-1;
    const pat=CONV_PATTERNS[$('.pt',host).value];
    input=[];for(let i=0;i<10;i++)for(let j=0;j<10;j++)input.push(pat(i,j));
    ig.innerHTML=input.map(v=>`<i style="background:${gray(v)}"></i>`).join('');
    const K=KERNELS[$('.kn',host).value];
    kg.innerHTML=K.k.map(v=>`<i>${(+v.toFixed(2)).toString().replace('0.','.')}</i>`).join('');
    out=new Array(64).fill(null);
    og.innerHTML=out.map(()=>'<i style="background:#fff"></i>').join('');
    $('.kwhy',host).innerHTML=`<b>${$('.kn',host).value}</b> — ${K.why}`;
    $('.cs',host).textContent='';
  }
  function step(){
    pos++;
    if(pos>=64){clearInterval(timer);timer=null;$('.run',host).textContent='▶ slide';highlight(-1);return;}
    const r=Math.floor(pos/8),c=pos%8;
    const K=KERNELS[$('.kn',host).value].k;
    let s=0,terms=[];
    for(let i=0;i<3;i++)for(let j=0;j<3;j++){
      const v=input[(r+i)*10+(c+j)];s+=v*K[i*3+j];
    }
    out[pos]=s;
    og.children[pos].style.background=diverge(s);
    $('.cs',host).textContent=`out[${r},${c}] = Σ window⊙kernel = ${fmt(s,2)}`;
    highlight(pos);
  }
  function highlight(p){
    $$('.ig i',host).forEach(i=>i.classList.remove('hot'));
    $$('.og i',host).forEach(i=>i.classList.remove('hot'));
    if(p<0)return;
    const r=Math.floor(p/8),c=p%8;
    for(let i=0;i<3;i++)for(let j=0;j<3;j++)ig.children[(r+i)*10+(c+j)].classList.add('hot');
    og.children[p].classList.add('hot');
  }
  $('.run',host).addEventListener('click',e=>{
    if(timer){clearInterval(timer);timer=null;e.target.textContent='▶ slide';return;}
    if(pos>=63)build();
    e.target.textContent='❚❚ pause';
    timer=setInterval(step,90);
  });
  $('.stepb',host).addEventListener('click',()=>{if(timer){clearInterval(timer);timer=null;$('.run',host).textContent='▶ slide';}if(pos>=63)build();step();});
  $('.pt',host).addEventListener('change',build);
  $('.kn',host).addEventListener('change',build);
  build();
}

body:[
{h:'Start here: the tensor ladder',
p:`<p>Before the passports, the picture. A <strong>tensor</strong> is simply a container for numbers arranged on a grid with a fixed number of directions, called <strong>axes</strong> (or dimensions). Climb the ladder one rung at a time:</p>
<ul>
<li><strong>0-D — scalar:</strong> a single number. A loss value, a temperature — <code>7.0</code>.</li>
<li><strong>1-D — vector:</strong> a row of numbers. Audio samples, or a word embedding.</li>
<li><strong>2-D — matrix:</strong> a table with rows and columns. A grayscale image, or a spreadsheet.</li>
<li><strong>3-D:</strong> a stack of tables. An RGB image is three colour planes — <code>(channels, height, width)</code>.</li>
<li><strong>4-D:</strong> a stack of those. A <em>batch</em> of 32 RGB images — <code>(32, 3, 64, 64)</code>.</li>
</ul>
<p>Two words describe any tensor: its <strong>rank</strong> (<code>ndim</code>) — how many axes it has — and its <strong>shape</strong> — how long each axis is. An easy way to feel it: a spreadsheet is 2-D, twelve monthly spreadsheets stacked together are 3-D, and a filing cabinet of yearly folders is 4-D.</p>`,
code:`import torch

scalar = torch.tensor(7.0)            # 0-D: just a number      shape ()
vector = torch.tensor([1., 2., 3.])   # 1-D: a list             shape (3,)
matrix = torch.tensor([[1., 2.],
                       [3., 4.]])      # 2-D: a table            shape (2, 2)
image  = torch.randn(3, 64, 64)       # 3-D: RGB image (C,H,W)  shape (3, 64, 64)
batch  = torch.randn(32, 3, 64, 64)   # 4-D: 32 such images     shape (32, 3, 64, 64)

{h:'A tensor is a typed, shaped, placed array',
p:`<p>A <code>torch.Tensor</code> is an n-dimensional array with three passports it carries everywhere: a <strong>shape</strong> (how the numbers are arranged), a <strong>dtype</strong> (how each number is stored), and a <strong>device</strong> (which chip the memory lives on). Ninety percent of real-world PyTorch errors are one of these three passports not matching.</p>`,
code:`import torch

# creation — memorise these six
a = torch.tensor([[1., 2.], [3., 4.]])   # from data (copies!)

d = torch.randn(3, 4)                    # ~ Normal(0, 1)

print(a.shape, a.dtype, a.device)        # torch.Size([2, 2]) torch.float32 cpu

{h:'dtype: the silent killer',
p:`<p>Deep learning defaults to <code>float32</code>. Class labels must be <code>int64</code> (long) for <code>CrossEntropyLoss</code>. Mixed-precision training adds <code>float16</code>/<code>bfloat16</code>. Mixing them silently upcasts — or loudly crashes.</p>
<div class="gotcha"><span class="g-tag">gotcha</span><p><code>torch.tensor([1,2,3])</code> gives you <strong>int64</strong>. Feed that into a linear layer and you get <em>"expected scalar type Float but found Long"</em>. Write <code>torch.tensor([1.,2.,3.])</code> or pass <code>dtype=torch.float32</code>.</p></div>`,

{h:'Views, reshapes and the memory underneath',
p:`<p>A tensor is a <em>view</em> over a flat 1-D buffer plus <strong>strides</strong> — how many buffer steps to jump per dimension. <code>view()</code>, <code>transpose()</code>, slicing and <code>permute()</code> create new tensors that <strong>share the same memory</strong>. Cheap, instant, and a classic source of spooky action at a distance.</p>`,

{id:'nn',n:'02',g:'Act I · Foundations',t:'Neural Network Fundamentals',read:'9 min',

{h:'Start here: what a "module" really is',
p:`<p>A neural network is just a function that turns input numbers into output numbers, with a lot of tunable knobs (parameters) in between. In PyTorch, every piece of that function — a single layer, a block, or the whole model — is packaged as an <code>nn.Module</code>. Think of it as a LEGO brick: it knows its own parameters and how to transform its input, and bricks snap together into bigger bricks.</p>
<ul>
<li><strong>parameter:</strong> a number the optimizer is allowed to tune (a weight or a bias).</li>
<li><strong>layer:</strong> a small, reusable transform, e.g. <code>nn.Linear</code>.</li>
<li><strong>forward pass:</strong> running an input through the module to get an output.</li>
</ul>`,

import torch.nn as nn

cap:'You never write layer.forward(x); you call layer(x) and PyTorch runs forward() for you (plus any hooks).'},
{h:'The nn.Module contract',
p:`<p>Every model, layer, block and loss in PyTorch is an <code>nn.Module</code>. The contract is two methods: <strong><code>__init__</code></strong> declares your parameters and sub-modules (declaring them as attributes is what <em>registers</em> them), and <strong><code>forward</code></strong> defines the computation. You never call <code>forward()</code> yourself — you call the module, and <code>__call__</code> runs hooks around your forward.</p>`,
code:`import torch
import torch.nn as nn
import torch.nn.functional as F

class MLP(nn.Module):
    def __init__(self, d_in=784, d_hidden=256, d_out=10):
        super().__init__()                    # never forget this line
        self.fc1 = nn.Linear(d_in, d_hidden)  # registers weight & bias
        self.fc2 = nn.Linear(d_hidden, d_out)
        self.dropout = nn.Dropout(p=0.2)

    def forward(self, x):
        x = x.flatten(1)          # (B, 1, 28, 28) → (B, 784)
        x = F.relu(self.fc1(x))
        x = self.dropout(x)
        return self.fc2(x)        # raw logits — no softmax!

model = MLP()
print(sum(p.numel() for p in model.parameters()))  # 203,530`,
cap:'Return logits. CrossEntropyLoss applies log-softmax internally; adding your own softmax is a classic silent bug.'},
{h:'Parameters vs. buffers vs. plain attributes',
p:`<p>An <code>nn.Parameter</code> is a tensor that shows up in <code>model.parameters()</code> — the optimizer will train it. A <strong>buffer</strong> (<code>register_buffer</code>) travels with the model — it's saved in the state_dict and moves with <code>.to(device)</code> — but receives no gradients. BatchNorm's running mean is a buffer. A plain Python attribute tensor is invisible to both, which is almost always a bug.</p>`,
code:`class Scaler(nn.Module):
    def __init__(self):
        super().__init__()
        self.gain = nn.Parameter(torch.ones(1))          # learned
        self.register_buffer("running_max", torch.zeros(1))  # tracked, not learned

    def forward(self, x):
        if self.training:
            self.running_max = torch.maximum(self.running_max, x.abs().max())
        return x * self.gain`},
{h:'Activations: why depth needs nonlinearity',
p:`<p>Stack ten <code>nn.Linear</code> layers with nothing between them and you have built… one linear layer, expensively. Nonlinear activations are what let depth create new functions. Modern defaults: <strong>ReLU</strong> for speed and sparsity, <strong>GELU</strong> in transformers, <strong>tanh</strong> for small nets and RNN gates, <strong>SiLU/Swish</strong> in modern convnets.</p>
<div class="gotcha"><span class="g-tag">gotcha</span><p><code>model.train()</code> and <code>model.eval()</code> do not train or evaluate anything. They flip a boolean that changes the behaviour of Dropout and BatchNorm. Forgetting <code>model.eval()</code> at inference means dropout keeps firing — your predictions become a slot machine.</p></div>`,
code:`model.train()   # dropout active, batchnorm uses batch stats
model.eval()    # dropout off,   batchnorm uses running stats

with torch.no_grad():          # also stop building the autograd graph
    preds = model(x_test).argmax(dim=1)`},
{h:'Train one live, right here',
p:`<p>Below is a real 2-layer MLP training in your browser via gradient descent — the same algorithm, minus the CUDA. Watch the decision boundary bend. Then break it: set the learning rate to 5 on the spiral and enjoy the fireworks.</p>`},
],

/* ---------- 03 AUTOGRAD ---------- */
{id:'autograd',n:'03',g:'Act I · Foundations',t:'Automatic Differentiation',read:'11 min',
sub:'PyTorch records every operation on a tape as you run it, then plays the tape backwards. This chapter is the soul of the framework.',
body:[
{h:'Start here: gradients, in one breath',
p:`<p>A gradient answers one question: "if I nudge this knob a tiny bit, how much does my error change, and in which direction?" <strong>Autograd</strong> is PyTorch computing all of those answers for you, automatically, for every parameter at once.</p>
<ul>
<li><strong>gradient / derivative:</strong> the rate of change — the slope.</li>
<li><strong>requires_grad:</strong> marks a tensor as a knob whose gradient should be tracked.</li>
<li><strong>.backward():</strong> compute the gradients.</li>
<li><strong>.grad:</strong> where each answer is stored afterwards.</li>
</ul>
<p>Analogy: you are hiking downhill in thick fog. The gradient is the slope you feel under your feet — it tells you which way is down, so you can step toward lower error.</p>`,
code:`import torch

x = torch.tensor(3.0, requires_grad=True)   # a knob we want to tune
y = x ** 2                                   # y = x²

y.backward()          # compute dy/dx and store it
print(x.grad)         # tensor(6.)  -> because dy/dx = 2x = 2·3`,
cap:'The slope of x² at x=3 is 2·3 = 6. Autograd just did the calculus so you never have to.'},
{h:'Define-by-run',
p:`<p>Every operation on a tensor with <code>requires_grad=True</code> appends a node to a <strong>dynamic graph</strong> — built fresh on every forward pass, which is why Python <code>if</code>s and loops just work. Calling <code>.backward()</code> on a scalar walks the graph in reverse topological order, applying the chain rule at each node, and <em>accumulates</em> results into each leaf's <code>.grad</code>.</p>`,
code:`import torch

w = torch.tensor(-1.0, requires_grad=True)
b = torch.tensor(0.5,  requires_grad=True)
x, t = torch.tensor(2.0), torch.tensor(6.0)

loss = (w * x + b - t) ** 2      # graph built HERE, op by op
loss.backward()                  # tape replayed in reverse

print(w.grad)   # ∂loss/∂w = 2(wx+b−t)·x = -30.0
print(b.grad)   # ∂loss/∂b = 2(wx+b−t)   = -15.0`,
cap:'This exact graph is the lab below. The numbers will match.'},
{h:'Play the tape yourself',
p:`<p>This is the live version of the code above. Slide, backward, step — you are performing gradient descent on a one-neuron network by hand.</p>`},
],
widget:'tape',
after:[
{h:'The three rules of .grad',
p:`<p><strong>1. Gradients accumulate.</strong> <code>backward()</code> adds into <code>.grad</code>; it does not overwrite. That's a feature (gradient accumulation for big effective batches) but it means you must call <code>optimizer.zero_grad()</code> every step. <strong>2. Only leaves keep grads.</strong> Intermediate tensors free theirs to save memory (use <code>.retain_grad()</code> if you need them). <strong>3. The graph is consumed.</strong> After <code>backward()</code>, buffers are freed; a second backward through the same graph raises unless you passed <code>retain_graph=True</code>.</p>
<div class="gotcha"><span class="g-tag">gotcha</span><p>The single most common beginner bug in all of PyTorch: forgetting <code>zero_grad()</code>. Your gradients snowball across steps, the loss goes to the moon, and nothing errors. If training "mysteriously diverges", check this first.</p></div>`,
code:`for x, y in loader:
    optimizer.zero_grad()        # rule 1: or grads accumulate forever
    loss = loss_fn(model(x), y)
    loss.backward()
    optimizer.step()

# stopping gradient flow, three ways
with torch.no_grad():            # block: no graph built at all
    ema_param.mul_(0.99).add_(param, alpha=0.01)

frozen = feats.detach()          # tensor: cut from the graph
model.head.weight.requires_grad_(False)   # parameter: freeze`},
{h:'Under the hood: grad_fn and custom Functions',
p:`<p>Each non-leaf tensor points to the <code>grad_fn</code> that created it (<code>MulBackward0</code>, <code>AddBackward0</code>…) — chase <code>.grad_fn.next_functions</code> and you can walk the whole tape. When you need a derivative PyTorch can't derive (a non-differentiable op, a fused kernel, a straight-through estimator), subclass <code>torch.autograd.Function</code>:</p>`,
code:`class ClampSTE(torch.autograd.Function):
    """Straight-through estimator: clamp forward, identity backward."""
    @staticmethod
    def forward(ctx, x):
        return x.clamp(-1, 1)

    @staticmethod
    def backward(ctx, grad_out):
        return grad_out            # pretend clamp was identity

y = ClampSTE.apply(x)              # used like any op`,
cap:'STEs are how quantization-aware training backpropagates through rounding.'},
{h:'One blog to bookmark',
p:`<p>The chain rule is easy to trust and easy to misuse; seeing where it silently breaks makes you a far better debugger.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Andrej Karpathy's <a href="https://karpathy.medium.com/yes-you-should-understand-backprop-e2f06eab496b" target="_blank" rel="noopener">"Yes you should understand backprop"</a> shows why knowing what autograd actually does — vanishing gradients, dead ReLUs, saturated sigmoids — saves you from bugs that no error message will ever explain.</p></div>`}],
quiz:[
{q:'You call loss.backward() twice per step without zero_grad(). The effective gradient is…',o:['The latest gradient','The sum of both backwards','An error, always','Halved'],a:1,why:'.grad accumulates by design. Without zeroing, steps use stale + fresh gradients summed.'},
{q:'In the lab above with x=2: if the error e = wx+b−t, then ∂L/∂w equals…',o:['2e','2e·x','e²','x'],a:1,why:'L=e², so dL/de=2e, and de/dw=x. Chain rule: 2e·x. The tape shows exactly this.'},
{q:'tensor.detach() gives you…',o:['A copy on CPU','The same data, severed from the graph','A frozen parameter','A NumPy array'],a:1,why:'Same storage, but requires_grad=False and no grad_fn — gradients stop there.'},
{q:'Why are dynamic graphs great for research?',o:['They are always faster','Control flow (if/for) can depend on data, per forward pass','They use less memory','They compile to C++'],a:1,why:'The graph is rebuilt each run, so data-dependent branching, recursion and variable-length loops are natural Python.'}]},

/* ---------- 04 TRAINING ---------- */
{id:'training',n:'04',g:'Act I · Foundations',t:'The Training Loop',read:'10 min',
sub:'Five lines you will write for the rest of your life — and the losses, optimizers, schedulers and sanity checks that orbit them.',
body:[
{h:'Start here: what "training" actually means',
p:`<p>Training is repeating four moves until the model stops making mistakes: <strong>guess</strong>, <strong>measure how wrong</strong>, <strong>figure out which way to adjust</strong>, <strong>adjust a little</strong>. In code those are forward, loss, backward, step.</p>
<ul>
<li><strong>epoch:</strong> one full pass over the whole dataset.</li>
<li><strong>batch:</strong> a small chunk of examples processed together.</li>
<li><strong>loss:</strong> one number summarising "how wrong" the guess was.</li>
<li><strong>optimizer:</strong> the thing that nudges the parameters.</li>
<li><strong>learning rate:</strong> how big each nudge is.</li>
</ul>
<p>Analogy: studying for an exam — take a practice test (forward), check your score (loss), review what you got wrong (backward), study those topics (step), and repeat.</p>`,
code:`# the four moves, stripped to the bone
for xb, yb in loader:            # one batch at a time
    optimizer.zero_grad()        # 1. clear last step's gradients
    pred = model(xb)             # 2. guess (forward pass)
    loss = loss_fn(pred, yb)     # 3. measure how wrong
    loss.backward()              # 4a. which way to adjust each knob?
    optimizer.step()             # 4b. take a small step`,
cap:'zero → forward → loss → backward → step. Every training script you will ever write is this, dressed up.'},
{h:'The canonical loop',
p:`<p>Everything else in this course is decoration around these lines. Read them until they are boring:</p>`,
code:`model = MLP().to(device)
optimizer = torch.optim.AdamW(model.parameters(), lr=3e-4, weight_decay=0.01)
loss_fn = nn.CrossEntropyLoss()

for epoch in range(epochs):
    model.train()
    for xb, yb in train_loader:
        xb, yb = xb.to(device), yb.to(device)
        optimizer.zero_grad()
        loss = loss_fn(model(xb), yb)
        loss.backward()
        optimizer.step()

    model.eval()
    with torch.no_grad():
        acc = evaluate(model, val_loader)`,
cap:'zero → forward → loss → backward → step. Tattoo optional but recommended.'},
{h:'Choosing a loss',
p:`<ul>
<li><strong>Multi-class classification</strong> → <code>nn.CrossEntropyLoss</code>. Takes raw logits <code>(B, C)</code> and integer labels <code>(B,)</code>. Not one-hot. Not probabilities.</li>
<li><strong>Binary / multi-label</strong> → <code>nn.BCEWithLogitsLoss</code>. The <em>WithLogits</em> matters: the fused sigmoid is numerically stable where a separate <code>Sigmoid + BCELoss</code> can produce NaNs.</li>
<li><strong>Regression</strong> → <code>nn.MSELoss</code>, or <code>nn.HuberLoss</code>/<code>SmoothL1Loss</code> when outliers exist.</li>
</ul>
<div class="gotcha"><span class="g-tag">gotcha</span><p>Shape mismatch + broadcasting = silently wrong loss. <code>MSELoss()(pred_of_shape_(B,1), target_of_shape_(B,))</code> broadcasts into a (B,B) matrix and averages it. PyTorch warns; people ignore warnings. Always <code>target.view_as(pred)</code>.</p></div>`},
{h:'Optimizers: SGD vs Adam vs AdamW',
p:`<p><strong>SGD + momentum</strong>: simple, memory-light, often the best final accuracy on vision with a tuned schedule. <strong>Adam</strong>: per-parameter adaptive learning rates; forgiving defaults, the standard for transformers and prototypes. <strong>AdamW</strong>: Adam with weight decay done correctly (decoupled from the gradient) — the modern default. Learning rate is the single highest-leverage hyperparameter you own: start at <code>3e-4</code> for Adam-family, <code>0.1</code> for SGD on vision, then bisect.</p>`,
code:`# schedulers shape the lr over time
sched = torch.optim.lr_scheduler.OneCycleLR(
    optimizer, max_lr=1e-3,
    total_steps=len(train_loader) * epochs)

for xb, yb in train_loader:
    ...
    optimizer.step()
    sched.step()            # per-BATCH for OneCycle / cosine-with-warmup

# gradient clipping — insurance for RNNs & transformers
torch.nn.utils.clip_grad_norm_(model.parameters(), max_norm=1.0)`},
{h:'Checkpoints: state_dict or nothing',
p:`<p>Save the <code>state_dict</code> (a plain dict of tensors), never the pickled model object — pickles break the moment your class definition moves. Resume-worthy checkpoints save the optimizer and scheduler too.</p>`,
code:`torch.save({
    "epoch": epoch,
    "model": model.state_dict(),
    "optim": optimizer.state_dict(),
    "sched": sched.state_dict(),
    "best_acc": best_acc,
}, "ckpt.pt")

ckpt = torch.load("ckpt.pt", map_location=device)
model.load_state_dict(ckpt["model"])
optimizer.load_state_dict(ckpt["optim"])`},
{h:'The overfit-one-batch test',
p:`<div class="whybox"><span class="g-tag">the pro move</span><p>Before training on the full dataset, train on <strong>one single batch</strong> until loss ≈ 0. If your model cannot memorise 32 examples, you have a bug — wrong shapes, wrong loss, frozen params, double softmax — and you just found it in 30 seconds instead of 3 GPU-hours.</p></div>`},
],

p:`<p>Most training failures are not exotic — they are a handful of mistakes almost everyone makes at least once.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Andrej Karpathy's <a href="https://karpathy.github.io/2019/04/25/recipe/" target="_blank" rel="noopener">"A Recipe for Training Neural Networks"</a> is the field's most-shared checklist for getting a training loop to actually work — including the overfit-one-batch test from this chapter, and why you should never trust a loss you have not sanity-checked.</p></div>`}],

{q:'CrossEntropyLoss expects…',o:['softmax probabilities + one-hot','logits + integer class indices','log-probs + one-hot','logits + floats in [0,1]'],a:1,why:'It fuses log-softmax + NLL. Inputs (B,C) logits, targets (B,) int64 indices.'},

{q:'AdamW differs from Adam by…',o:['Nesterov momentum','decoupled weight decay','lower memory','being deterministic'],a:1,why:'Adam entangles L2 penalty with adaptive scaling; AdamW applies decay directly to weights — better generalisation.'},
{q:'The overfit-one-batch test verifies…',o:['generalisation','that the pipeline can learn at all','GPU speed','data quality'],a:1,why:'If a net cannot memorise one batch, the plumbing (shapes, loss, grads) is broken. Cheapest bug detector known.'}]},

/* ---------- 05 DATA ---------- */
{id:'data',n:'05',g:'Act I · Foundations',t:'Data Loading & Preprocessing',read:'8 min',
sub:'Dataset says what an example is; DataLoader turns examples into shuffled, batched, parallel-loaded tensors. GPUs starve without this chapter.',
body:[
{h:'Start here: feeding the machine',
p:`<p>Models learn from examples, but they want those examples as neat, shuffled, batched tensors — not as loose files on disk. Two objects handle this: a <strong>Dataset</strong> knows how to fetch <em>one</em> example, and a <strong>DataLoader</strong> turns many examples into shuffled batches, loading them in the background so the GPU never waits.</p>
<ul>
<li><strong>sample / example:</strong> one input paired with its label.</li>
<li><strong>batch:</strong> a stack of samples processed together.</li>
<li><strong>shuffle:</strong> randomise the order every epoch so the model does not memorise sequence.</li>
<li><strong>transform:</strong> preprocessing applied to a sample (resize, normalise, augment).</li>
</ul>
<p>Analogy: the Dataset is the recipe for a single plate; the DataLoader is the kitchen line plating many at once and handing them out in a steady stream.</p>`,
code:`from torch.utils.data import Dataset, DataLoader

class Squares(Dataset):
    def __len__(self):            # how many examples exist
        return 100
    def __getitem__(self, i):     # how to fetch example i
        x = torch.tensor([i * 1.0])
        return x, x ** 2          # (input, label)

loader = DataLoader(Squares(), batch_size=8, shuffle=True)
xb, yb = next(iter(loader))
print(xb.shape)     # torch.Size([8, 1]) -> a batch of 8, ready for the model`,
cap:'__len__ + __getitem__ is the entire Dataset contract; the DataLoader adds batching, shuffling and parallel loading.'},
{h:'The Dataset contract',
p:`<p>A map-style <code>Dataset</code> implements <code>__len__</code> and <code>__getitem__</code>. That's the whole interface. Do your heavy transforms lazily inside <code>__getitem__</code> so worker processes parallelise them.</p>`,
code:`from torch.utils.data import Dataset, DataLoader

class CsvDataset(Dataset):
    def __init__(self, df, transform=None):
        self.X = torch.tensor(df.drop(columns="label").values, dtype=torch.float32)
        self.y = torch.tensor(df["label"].values, dtype=torch.long)
        self.transform = transform

    def __len__(self):
        return len(self.y)

    def __getitem__(self, i):
        x = self.X[i]
        if self.transform:
            x = self.transform(x)
        return x, self.y[i]`},
{h:'DataLoader: the parts that matter',
p:`<ul>
<li><code>batch_size</code> — with <code>shuffle=True</code> for training, <code>False</code> for eval.</li>
<li><code>num_workers</code> — subprocesses preparing batches ahead of the GPU. 0 means the main process does everything (fine for debugging, slow for training). Start at 4 per GPU.</li>
<li><code>pin_memory=True</code> — page-locked host memory enables fast async <code>.to(device, non_blocking=True)</code> copies.</li>
<li><code>drop_last=True</code> — drop the ragged final batch; BatchNorm hates batch size 1.</li>
<li><code>collate_fn</code> — how a list of samples becomes a batch; override it for variable-length sequences (padding) or exotic structures.</li>
</ul>`,
code:`loader = DataLoader(ds, batch_size=64, shuffle=True,
                    num_workers=4, pin_memory=True, drop_last=True)

# custom collate: pad variable-length sequences
from torch.nn.utils.rnn import pad_sequence
def collate(batch):
    seqs, labels = zip(*batch)
    lengths = torch.tensor([len(s) for s in seqs])
    return pad_sequence(seqs, batch_first=True), torch.stack(labels), lengths`},
{h:'Transforms & splits',
p:`<p>Vision pipelines chain <code>torchvision.transforms</code>: augment at train time (crops, flips), never at eval time; normalise with <em>training-set</em> statistics in both.</p>
<div class="gotcha"><span class="g-tag">gotcha</span><p>Computing normalisation stats — or fitting any preprocessing — on the full dataset before splitting is <strong>data leakage</strong>. The validation set has now whispered its statistics to the model. Split first, fit on train only.</p></div>`,
code:`from torchvision import transforms
train_tf = transforms.Compose([
    transforms.RandomResizedCrop(224),
    transforms.RandomHorizontalFlip(),
    transforms.ToTensor(),
    transforms.Normalize(mean=[0.485,0.456,0.406], std=[0.229,0.224,0.225]),
])

train_ds, val_ds = torch.utils.data.random_split(
    ds, [0.9, 0.1], generator=torch.Generator().manual_seed(42))`,
cap:'Seed the split generator or your "validation set" changes every run and your metrics are fiction.'}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>The input pipeline is the most common hidden cause of a slow GPU — worth understanding well.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>PyTorch's official <a href="https://pytorch.org/tutorials/beginner/basics/data_tutorial.html" target="_blank" rel="noopener">"Datasets &amp; DataLoaders"</a> guide walks the whole path from a raw <code>Dataset</code> to batched tensors, and is the clearest reference for <code>num_workers</code>, <code>collate_fn</code> and transforms when you roll your own.</p></div>`}],
quiz:[
{q:'num_workers=0 means…',o:['no data loading','loading in the main process — GPU may starve','an error','one worker thread'],a:1,why:'Zero workers = synchronous loading in the training process. The GPU waits on Python between batches.'},
{q:'pin_memory=True exists to…',o:['cache the dataset in RAM','enable fast async host→GPU copies','shuffle better','lock the file'],a:1,why:'Page-locked memory lets CUDA DMA transfer overlap compute via non_blocking=True.'},
{q:'Normalising with statistics computed on train+val together is…',o:['best practice','data leakage','required by BatchNorm','only wrong for images'],a:1,why:'Any statistic fitted on validation data leaks information about it into training. Fit on train only.'}]},

/* ---------- 06 CNN ---------- */
{id:'cnn',n:'06',g:'Act II · Architectures',t:'Convolutional Networks',read:'10 min',
sub:'Convolutions bake two facts about images into the architecture: nearby pixels are related, and a cat in the corner is still a cat.',
body:[
{h:'Start here: why images need a different layer',
p:`<p>An image is a grid of pixels, and nearby pixels belong together — an edge, an eye, a wheel each span a little patch, not the whole picture. A <strong>convolution</strong> is a tiny window (a kernel) that slides across the image hunting for one pattern everywhere it goes. Learn a single edge detector once, reuse it across the entire image.</p>
<ul>
<li><strong>kernel / filter:</strong> the small sliding window of learnable weights.</li>
<li><strong>channel:</strong> one feature map (or a colour plane, like R, G, B).</li>
<li><strong>stride:</strong> how many pixels the window jumps each step.</li>
<li><strong>padding:</strong> a border added so the edges are not lost.</li>
<li><strong>feature map:</strong> the output showing where the pattern was found.</li>
</ul>
<p>Analogy: a rubber stamp you press across a page — the same stamp, pressed everywhere, marking each spot it matches.</p>`,
code:`import torch
import torch.nn as nn

x = torch.randn(1, 3, 32, 32)     # 1 image, 3 colour channels, 32×32
conv = nn.Conv2d(in_channels=3, out_channels=16, kernel_size=3, padding=1)
y = conv(x)
print(y.shape)   # torch.Size([1, 16, 32, 32]) -> 16 feature maps, size preserved`,
cap:'One Conv2d holds out_channels little kernels; a 3×3 kernel with padding=1 keeps the height and width unchanged.'},
{h:'Why convolution beats dense on images',
p:`<p>A dense layer on a 224×224 RGB image needs 150K weights <em>per neuron</em> and must relearn "edge" separately at every location. A conv layer learns one small kernel and slides it everywhere: <strong>local connectivity</strong> + <strong>weight sharing</strong> = translation equivariance and a ~1000× parameter cut. Watch the mechanism:</p>`},
],
widget:'conv',
after:[
{h:'Shape arithmetic you can do in your head',
p:`<p>For input size N, kernel K, padding P, stride S: <code>out = ⌊(N + 2P − K)/S⌋ + 1</code>. The two idioms to memorise: <strong>3×3, padding 1, stride 1</strong> preserves size; <strong>stride 2</strong> halves it. Channels are independent of all this — <code>Conv2d(C_in, C_out, ...)</code> holds <code>C_out</code> kernels, each spanning all <code>C_in</code> input channels.</p>`,
code:`import torch.nn as nn

class ConvBlock(nn.Module):
    def __init__(self, c_in, c_out, stride=1):
        super().__init__()
        self.conv = nn.Conv2d(c_in, c_out, 3, stride, padding=1, bias=False)
        self.bn   = nn.BatchNorm2d(c_out)   # bias=False: BN has its own shift
    def forward(self, x):
        return nn.functional.relu(self.bn(self.conv(x)))

class SmallNet(nn.Module):
    def __init__(self, n_classes=10):
        super().__init__()
        self.features = nn.Sequential(
            ConvBlock(3, 32), ConvBlock(32, 32),
            ConvBlock(32, 64, stride=2),       # 32×32 → 16×16
            ConvBlock(64, 64),
            ConvBlock(64, 128, stride=2),      # → 8×8
        )
        self.pool = nn.AdaptiveAvgPool2d(1)    # → (B,128,1,1), any input size
        self.head = nn.Linear(128, n_classes)
    def forward(self, x):
        return self.head(self.pool(self.features(x)).flatten(1))`,
cap:'AdaptiveAvgPool2d(1) is the trick that makes one network accept any image resolution.'},
{h:'Residual connections: the deep-network unlock',
p:`<p>Past ~20 layers, plain convnets get <em>worse</em> with depth — not from overfitting but from optimisation failure. ResNet's fix: make each block compute a <strong>residual</strong>, <code>out = F(x) + x</code>. Identity becomes the default (easy to learn: push F to zero), and the skip path gives gradients an unobstructed highway to early layers. This one idea enabled 100+ layer networks and echoes through every transformer.</p>`,
code:`class ResidualBlock(nn.Module):
    def __init__(self, c):
        super().__init__()
        self.c1 = nn.Conv2d(c, c, 3, padding=1, bias=False)
        self.b1 = nn.BatchNorm2d(c)
        self.c2 = nn.Conv2d(c, c, 3, padding=1, bias=False)
        self.b2 = nn.BatchNorm2d(c)
    def forward(self, x):
        out = F.relu(self.b1(self.c1(x)))
        out = self.b2(self.c2(out))
        return F.relu(out + x)        # the skip: gradient superhighway`},
{h:'Transfer learning: the 95% use case',
p:`<p>Almost nobody trains vision backbones from scratch. Load ImageNet weights, replace the head, fine-tune. Two regimes: <strong>feature extraction</strong> (freeze backbone; fast, small data) and <strong>fine-tuning</strong> (unfreeze with a 10–100× smaller lr for pretrained layers).</p>`,
code:`from torchvision import models
m = models.resnet50(weights="IMAGENET1K_V2")
m.fc = nn.Linear(m.fc.in_features, n_classes)   # new head

for p in m.parameters():        # regime 1: freeze all…
    p.requires_grad = False
for p in m.fc.parameters():     # …except the head
    p.requires_grad = True`},
{h:'One blog to bookmark',
p:`<p>The shape arithmetic and intuition behind convnets reward one careful, visual read.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Stanford CS231n's <a href="https://cs231n.github.io/convolutional-networks/" target="_blank" rel="noopener">"Convolutional Neural Networks"</a> notes are the classic explanation of kernels, stride, padding, receptive fields and pooling — with the diagrams that make the output-size formula finally stick.</p></div>`}],
