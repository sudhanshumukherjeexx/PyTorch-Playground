/* ---------- 10 DEPLOYMENT ---------- */
{id:'deploy',n:'10',g:'Act III · Production',t:'Model Deployment',read:'8 min',
sub:'A model in a notebook is a science project. This chapter is the bridge from .pt file to production traffic.',
body:[
{h:'Start here: from notebook to the real world',
p:`<p>A trained model is a file full of numbers plus the code that runs them. <strong>Deployment</strong> is wrapping that so other programs can send it inputs and get predictions back — reliably, quickly, and without dragging your training code along.</p>
<ul>
<li><strong>inference:</strong> using a trained model to predict, with no learning happening.</li>
<li><strong>checkpoint / state_dict:</strong> the saved weights of the model.</li>
<li><strong>serialization / export:</strong> turning the model into a portable file.</li>
<li><strong>latency:</strong> time for one prediction. <strong>throughput:</strong> predictions per second.</li>
</ul>
<p>Analogy: training is writing the recipe; deployment is opening the restaurant and serving it, fast, to every customer who walks in.</p>`,
code:`# the two moves that separate training from serving
model.eval()                       # freeze dropout / batchnorm for inference
with torch.inference_mode():       # no gradient bookkeeping -> faster, leaner
    logits = model(x)
    pred = logits.argmax(dim=1)    # the actual answer you return`,
cap:'model.eval() + torch.inference_mode() is the minimum ritual before any model faces real traffic.'},
{h:'Export: escape the Python interpreter',
p:`<p>Production wants your model without a Python dependency, or at least without your training code. The modern path is <code>torch.export</code> / <code>torch.compile</code>-era tooling plus <strong>ONNX</strong> for cross-runtime portability (TensorRT, ONNX Runtime, CoreML, browsers). TorchScript (<code>torch.jit.trace/script</code>) is the legacy path you will still meet in the wild.</p>
<div class="gotcha"><span class="g-tag">gotcha</span><p><code>torch.jit.trace</code> records ONE execution path with example inputs. Data-dependent <code>if</code> branches are frozen at trace time — your exported model silently always takes the branch the example took. Use scripting or torch.export for control flow.</p></div>`,
code:`model.eval()
example = torch.randn(1, 3, 224, 224)

# ONNX — the lingua franca
torch.onnx.export(model, example, "model.onnx",
                  input_names=["image"], output_names=["logits"],
                  dynamic_axes={"image": {0: "batch"}})   # variable batch!

# verify before you ship
import onnxruntime as ort
sess = ort.InferenceSession("model.onnx")
out = sess.run(None, {"image": example.numpy()})
torch.testing.assert_close(model(example), torch.tensor(out[0]),
                           rtol=1e-3, atol=1e-4)`,
cap:'Always numerically compare the exported model against the original. Silent export drift is real.'},
{h:'Inference-mode hygiene',
p:`<p>The inference checklist: <code>model.eval()</code> (freeze dropout/BN), <code>torch.inference_mode()</code> (stronger, faster no_grad), batch requests together, and pick precision deliberately — fp16/bf16 on GPU roughly doubles throughput.</p>`,
code:`@torch.inference_mode()          # decorator form
def predict(batch):
    return model(batch.to(device)).softmax(-1)

# a minimal FastAPI wrapper
from fastapi import FastAPI
app = FastAPI()

@app.post("/predict")
async def route(payload: Payload):
    x = preprocess(payload)           # same transforms as eval!
    probs = predict(x)
    return {"class": int(probs.argmax()), "conf": float(probs.max())}`},
{h:'The deployment menu',
p:`<ul>
<li><strong>Server GPU</strong> — TorchServe, Triton, or a hand-rolled FastAPI + batching queue. Triton if you need multi-model, dynamic batching, metrics.</li>
<li><strong>Edge / mobile</strong> — ExecuTorch (PyTorch's mobile runtime), CoreML, or TFLite via ONNX; quantize first (chapter 17).</li>
<li><strong>Browser</strong> — ONNX Runtime Web / WebGPU for small models.</li>
</ul>
<div class="whybox"><span class="g-tag">why it matters</span><p>Training-serving skew — preprocessing that differs between your Dataset and your API — is the #1 production ML bug. Package the transform <em>with</em> the model, and test the whole pipeline, not the weights.</p></div>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>ONNX is the most common bridge out of PyTorch into fast, portable runtimes — worth a proper first look.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>PyTorch's official <a href="https://pytorch.org/tutorials/beginner/onnx/intro_onnx.html" target="_blank" rel="noopener">"Introduction to ONNX"</a> tutorial walks through exporting a model, inspecting the graph, and verifying the exported version matches the original numerically — the export drift check this chapter insists on.</p></div>`}],
quiz:[
{q:'torch.jit.trace on a model with data-dependent if-branches will…',o:['error loudly','freeze whichever branch the example input took','handle both branches','fall back to eager'],a:1,why:'Tracing records ops actually executed. Untaken branches simply do not exist in the traced graph.'},
{q:'dynamic_axes in torch.onnx.export exists to…',o:['speed up export','allow variable batch size at inference','enable quantization','compress the file'],a:1,why:'Without it the exported graph hard-codes the example batch size — batch-1 only serving.'},
{q:'The most common production ML bug class is…',o:['GPU OOM','training–serving preprocessing skew','integer overflow','license issues'],a:1,why:'If serving normalises differently than training did, the model quietly sees a distribution it never learned.'}]},

/* ---------- 11 LIGHTNING ---------- */
{id:'lightning',n:'11',g:'Act III · Production',t:'PyTorch Lightning',read:'7 min',
sub:'Keep your science, delete your boilerplate. Lightning owns the loop; you own the ideas.',
body:[
{h:'Start here: deleting the boilerplate',
p:`<p>Every training script repeats the same plumbing: move data to the GPU, zero the gradients, backward, step, save checkpoints, loop over epochs. <strong>PyTorch Lightning</strong> writes that plumbing for you, so you only write the parts that are actually your idea — the model and the loss.</p>
<ul>
<li><strong>boilerplate:</strong> repetitive glue code that is the same in every project.</li>
<li><strong>LightningModule:</strong> your model plus its train/validation steps.</li>
<li><strong>Trainer:</strong> the object that owns the loop and the hardware.</li>
<li><strong>callback:</strong> a plug-in for checkpointing, early stopping, logging, etc.</li>
</ul>
<p>Analogy: same engine, but Lightning is the automatic transmission — you stop shifting gears by hand and just drive.</p>`,
code:`import lightning as L

class Lit(L.LightningModule):
    def training_step(self, batch, idx):        # just the science...
        x, y = batch
        return self.loss_fn(self.net(x), y)     # no zero_grad/backward/step!
    def configure_optimizers(self):
        return torch.optim.Adam(self.parameters(), lr=1e-3)

L.Trainer(max_epochs=10, accelerator="auto").fit(Lit(), loader)  # ...Lightning drives`,
cap:'Notice what is gone: device moves, zero_grad, backward, step, the epoch loop. The Trainer owns all of it.'},
{h:'The refactor',
p:`<p>Lightning reorganises the code you already wrote: model + loss into a <code>LightningModule</code>, loops/devices/checkpointing into the <code>Trainer</code>. The payoff is that <em>one flag</em> switches you from laptop CPU to multi-GPU bf16 with gradient accumulation — no loop rewrites.</p>`,
code:`import lightning as L

class LitClassifier(L.LightningModule):
    def __init__(self, lr=3e-4):
        super().__init__()
        self.save_hyperparameters()
        self.net = SmallNet()
        self.loss_fn = nn.CrossEntropyLoss()

    def training_step(self, batch, batch_idx):
        x, y = batch                      # no .to(device) — handled
        loss = self.loss_fn(self.net(x), y)
        self.log("train_loss", loss, prog_bar=True)
        return loss                       # no backward/step — handled

    def validation_step(self, batch, batch_idx):
        x, y = batch
        acc = (self.net(x).argmax(1) == y).float().mean()
        self.log("val_acc", acc, prog_bar=True)

    def configure_optimizers(self):
        return torch.optim.AdamW(self.parameters(), lr=self.hparams.lr)

trainer = L.Trainer(max_epochs=10, accelerator="auto", devices="auto",
                    precision="bf16-mixed",
                    callbacks=[L.pytorch.callbacks.ModelCheckpoint(monitor="val_acc", mode="max"),
                               L.pytorch.callbacks.EarlyStopping(monitor="val_acc", mode="max", patience=3)])
trainer.fit(LitClassifier(), train_loader, val_loader)`,
cap:'Notice what is absent: device moves, zero_grad, backward, step, checkpoint code, epoch loops.'},
{h:'What you get for free',
p:`<ul>
<li><strong>Scaling flags</strong>: <code>devices=8, strategy="ddp"</code> or <code>"fsdp"</code> — same script.</li>
<li><strong>Callbacks</strong>: checkpointing, early stopping, LR monitors, your own hooks.</li>
<li><strong>Loggers</strong>: TensorBoard/W&B/MLflow via <code>self.log</code>.</li>
<li><strong>Sanity</strong>: automatic val sanity check, <code>overfit_batches=1</code> (chapter 4's test as a flag!), <code>fast_dev_run=True</code> smoke tests.</li>
</ul>
<p>When to skip it: exotic training loops (GANs with unusual update ratios, RL) where owning the loop is the point — though <code>manual_optimization</code> covers most of these.</p>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>The fastest way to internalise the Lightning split is to convert one plain loop and see what disappears.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Lightning's own <a href="https://lightning.ai/docs/pytorch/stable/starter/introduction.html" target="_blank" rel="noopener">"Lightning in 15 minutes"</a> guide takes a raw PyTorch loop and refactors it into a <code>LightningModule</code> + <code>Trainer</code> in front of you — the clearest map of exactly which lines Lightning takes over.</p></div>`}],
quiz:[
{q:'In training_step you should NOT call…',o:['self.log','loss.backward()','self.net(x)','return loss'],a:1,why:'Lightning runs backward/step for you. Returning the loss is the contract.'},
{q:'overfit_batches=1 in Trainer is…',o:['a bug','the overfit-one-batch sanity test as a built-in','for tiny datasets','deprecated'],a:1,why:'It trains on a single batch repeatedly — the chapter 4 debugging ritual, productised.'}]},

/* ---------- 12 DISTRIBUTED ---------- */
{id:'distributed',n:'12',g:'Act III · Production',t:'Distributed Training',read:'10 min',
sub:'One GPU is a bicycle. This chapter is the freight train: DDP, FSDP, and the collective ops underneath them.',
body:[
{h:'Start here: many GPUs, one model',
p:`<p>One GPU can only hold so much and train so fast. <strong>Distributed training</strong> splits the work across many GPUs (or many machines) that cooperate to train a single model. The most common flavour gives each GPU the same model but a different slice of the data, then averages what they each learn.</p>
<ul>
<li><strong>rank:</strong> a GPU's ID number in the group. <strong>world size:</strong> the total number of GPUs.</li>
<li><strong>replica:</strong> a full copy of the model living on one GPU.</li>
<li><strong>all-reduce:</strong> averaging the gradients across every GPU.</li>
<li><strong>shard:</strong> a split-up piece of the data (or, later, of the model).</li>
</ul>
<p>Analogy: a study group where everyone reads different chapters, then pools notes so all of them end up with the same complete summary.</p>`,
code:`# each GPU runs this same script; torchrun assigns it a rank
import torch.distributed as dist
from torch.nn.parallel import DistributedDataParallel as DDP

dist.init_process_group("nccl")                  # GPUs join the group
model = DDP(model.to(rank), device_ids=[rank])   # wrap the model once
# ...your normal training loop is UNCHANGED; gradients auto-average across GPUs

# launch:  torchrun --nproc_per_node=4 train.py`,
cap:'Wrap the model in DDP and your ordinary loop suddenly runs on 4 GPUs with gradients averaged automatically.'},
{h:'DDP: the workhorse',
p:`<p><strong>DistributedDataParallel</strong> runs one process per GPU. Each holds a full model replica and a different data shard; after backward, gradients are <strong>all-reduced</strong> (averaged across ranks, overlapped with backward computation for speed), so every replica takes an identical optimizer step. Result: near-linear scaling for models that fit on one GPU.</p>`,
code:`import torch.distributed as dist
from torch.nn.parallel import DistributedDataParallel as DDP
from torch.utils.data.distributed import DistributedSampler

def main():
    dist.init_process_group("nccl")            # torchrun sets env vars
    rank = dist.get_rank()
    device = rank % torch.cuda.device_count()

    model = SmallNet().to(device)
    model = DDP(model, device_ids=[device])

    sampler = DistributedSampler(train_ds)     # each rank: unique shard
    loader  = DataLoader(train_ds, batch_size=64, sampler=sampler)

    for epoch in range(epochs):
        sampler.set_epoch(epoch)               # reshuffle across epochs!
        for xb, yb in loader:
            ...                                # loop is UNCHANGED

# launch:  torchrun --nproc_per_node=4 train.py`,
cap:'Forget sampler.set_epoch(epoch) and every epoch sees the same shard order — a subtle accuracy tax.'},
{h:'When the model itself doesn\'t fit: FSDP',
p:`<p>DDP keeps a full copy of params + grads + optimizer state on every GPU — for a 7B model in Adam that's ~112 GB per rank. <strong>FSDP (Fully Sharded Data Parallel)</strong> shards all three across ranks, all-gathering parameters just-in-time per layer and freeing them after. You trade communication for the ability to train models far larger than one device.</p>`,
code:`from torch.distributed.fsdp import FullyShardedDataParallel as FSDP
from torch.distributed.fsdp.wrap import transformer_auto_wrap_policy
import functools

policy = functools.partial(transformer_auto_wrap_policy,
                           transformer_layer_cls={Block})
model = FSDP(model, auto_wrap_policy=policy,
             mixed_precision=bf16_policy, device_id=device)`},
{h:'The mental model: collectives',
p:`<ul>
<li><strong>all-reduce</strong> — everyone contributes, everyone gets the sum/mean (DDP gradients).</li>
<li><strong>all-gather</strong> — everyone gets everyone's shard (FSDP params before a layer).</li>
<li><strong>reduce-scatter</strong> — sum, then shard the result (FSDP gradients).</li>
<li><strong>broadcast</strong> — rank 0 to all (initial weights).</li>
</ul>
<div class="gotcha"><span class="g-tag">gotcha</span><p>Every rank runs your whole script. Print statements fire N times, checkpoints save N times, wandb runs N times. Guard side effects with <code>if rank == 0:</code> — and put a <code>dist.barrier()</code> before other ranks load what rank 0 saved.</p></div>
<p>Beyond data parallelism: tensor parallel (split matmuls across GPUs), pipeline parallel (split layers into stages) — the large-LLM stack composes all three ("3D parallelism").</p>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>When a model no longer fits on one GPU, sharding — not replication — is the answer, and it helps to see why.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>The PyTorch team's <a href="https://pytorch.org/blog/introducing-pytorch-fully-sharded-data-parallel-api/" target="_blank" rel="noopener">"Introducing PyTorch Fully Sharded Data Parallel (FSDP)"</a> explains, with clear diagrams, how params, gradients and optimizer state get sharded across ranks — the exact trade of communication for memory that lets you train billion-parameter models.</p></div>`}],
quiz:[
{q:'After backward, DDP synchronises replicas by…',o:['broadcasting rank 0 weights','all-reducing (averaging) gradients','sharing optimizer state','locking a mutex'],a:1,why:'Averaged grads + identical initial weights + identical updates ⇒ replicas never diverge.'},
{q:'FSDP\'s advantage over DDP is…',o:['less communication','sharding params/grads/optimizer state so huge models fit','simpler code','determinism'],a:1,why:'DDP replicates full training state per GPU; FSDP shards it, trading comms for memory.'},
{q:'sampler.set_epoch(epoch) exists so that…',o:['LR decays','the shuffle differs every epoch across ranks','checkpoints sync','workers restart'],a:1,why:'DistributedSampler seeds its shuffle with the epoch; without it, ordering repeats identically.'}]},

/* ---------- 13 EXTENSIONS ---------- */
{id:'extensions',n:'13',g:'Act III · Production',t:'Custom Extensions',read:'8 min',
sub:'When Python is too slow and no built-in op fits: custom autograd Functions, C++ extensions, Triton kernels — and knowing when NOT to write them.',
body:[
{h:'Start here: teaching PyTorch a new trick',
p:`<p>PyTorch already knows how to differentiate thousands of operations. But sometimes you need one it does not have, or a faster version of one it does. <strong>Custom extensions</strong> let you define your own operation — and, crucially, tell autograd how to compute its gradient — so it plugs into the rest of the framework as if it were built in.</p>
<ul>
<li><strong>operation / op:</strong> a single math step, like add or matmul.</li>
<li><strong>forward:</strong> compute the output from the inputs.</li>
<li><strong>backward:</strong> compute the gradient of the output w.r.t. the inputs.</li>
<li><strong>kernel:</strong> the low-level code (CPU/CUDA/Triton) that actually runs the op.</li>
</ul>
<p>Analogy: most cooking uses standard utensils; occasionally you machine a custom tool for one special cut you cannot make otherwise.</p>`,
code:`import torch

class Square(torch.autograd.Function):
    @staticmethod
    def forward(ctx, x):
        ctx.save_for_backward(x)     # stash what backward will need
        return x * x
    @staticmethod
    def backward(ctx, g):
        (x,) = ctx.saved_tensors
        return g * 2 * x             # d(x²)/dx = 2x

y = Square.apply(torch.tensor(3.0, requires_grad=True))   # behaves like any op`,
cap:'Define forward and backward, and your operation behaves exactly like a native PyTorch op — gradients included.'},
{h:'Level 1: custom autograd Function (pure Python)',
p:`<p>Ninety percent of "I need a custom op" cases end here — you define forward and backward on tensors, autograd handles the graph plumbing. <code>ctx.save_for_backward</code> stashes what backward will need.</p>`,
code:`class SwishManual(torch.autograd.Function):
    @staticmethod
    def forward(ctx, x):
        s = torch.sigmoid(x)
        ctx.save_for_backward(x, s)
        return x * s

    @staticmethod
    def backward(ctx, grad_out):
        x, s = ctx.saved_tensors
        return grad_out * (s + x * s * (1 - s))   # d/dx[x·σ(x)]

# ALWAYS verify against numerical differentiation:
x = torch.randn(20, dtype=torch.double, requires_grad=True)
torch.autograd.gradcheck(SwishManual.apply, (x,))   # True or it raises`,
cap:'gradcheck in float64 is non-negotiable. Wrong-but-plausible gradients train wrong-but-plausible models.'},
{h:'Level 2: C++/CUDA extensions',
p:`<p>When the op itself is the bottleneck — a fused kernel, an exotic scan — write it in C++/CUDA and bind it. PyTorch compiles it against its own headers so tensors cross the boundary natively.</p>`,
code:`# setup.py
from torch.utils.cpp_extension import CppExtension, BuildExtension
setup(name="myops",
      ext_modules=[CppExtension("myops", ["myops.cpp"])],
      cmdclass={"build_ext": BuildExtension})

// myops.cpp
#include <torch/extension.h>
torch::Tensor fused_bias_gelu(torch::Tensor x, torch::Tensor b) {
    auto y = x + b;
    return y * 0.5 * (1.0 + torch::erf(y / std::sqrt(2.0)));
}
PYBIND11_MODULE(TORCH_EXTENSION_NAME, m) {
    m.def("fused_bias_gelu", &fused_bias_gelu);
}`},
{h:'Level 3 (and the modern shortcut): Triton & torch.compile',
p:`<p><strong>Triton</strong> lets you write GPU kernels in Python with block-level parallelism — it's what powers much of torch.compile's codegen and FlashAttention reimplementations. But before writing any kernel, try <code>torch.compile(model)</code>: its fusion pass may already generate the kernel you were about to hand-write.</p>
<div class="whybox"><span class="g-tag">decision rule</span><p>Profile first (chapter 14). If the hotspot is many small pointwise ops → torch.compile. If it's a genuinely novel memory-access pattern → Triton. If it's an existing op being slow → check you're not fighting non-contiguous tensors before writing a single kernel.</p></div>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>Before reaching for C++ or CUDA, it pays to know exactly how far pure-Python extensions can take you.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>PyTorch's official <a href="https://pytorch.org/docs/stable/notes/extending.html" target="_blank" rel="noopener">"Extending PyTorch"</a> notes are the canonical reference for writing custom <code>autograd.Function</code>s and modules correctly — including the save-for-backward and <code>gradcheck</code> discipline this chapter warns you never to skip.</p></div>`}],
quiz:[
{q:'ctx.save_for_backward exists because…',o:['Python closures leak','backward often needs forward intermediates, stored safely w.r.t. memory & versioning','it enables JIT','grads are lazy'],a:1,why:'It stores tensors with version-checking so autograd can detect illegal in-place mutation between forward and backward.'},
{q:'Before shipping a custom backward you must run…',o:['unit tests only','torch.autograd.gradcheck in float64','torch.compile','a profiler'],a:1,why:'gradcheck compares your analytic gradient to finite differences — the only reliable correctness oracle.'}]},

/* ---------- 14 PERFORMANCE ---------- */
{id:'performance',n:'14',g:'Act III · Production',t:'Performance Optimization',read:'10 min',
sub:'The GPU is rarely the bottleneck — your pipeline is. Profile first, then apply the big four: mixed precision, compile, better data loading, bigger effective batches.',
body:[
{h:'Start here: why your GPU is bored',
p:`<p>A slow training run is usually not a slow GPU — it is a GPU sitting idle, waiting for data or waiting on Python. The whole game of <strong>performance</strong> is finding what everyone is waiting for and removing it.</p>
<ul>
<li><strong>bottleneck:</strong> the slowest link that caps the whole pipeline.</li>
<li><strong>profiling:</strong> measuring where the time actually goes.</li>
<li><strong>throughput:</strong> samples processed per second. <strong>utilisation:</strong> how busy the GPU really is.</li>
<li><strong>mixed precision:</strong> doing math in smaller number formats to go faster.</li>
</ul>
<p>Analogy: a fast chef who keeps stopping because ingredients arrive late — fix the supply line, not the chef.</p>`,
code:`# the single highest-yield speed trick: mixed precision
scaler = torch.amp.GradScaler()
for xb, yb in loader:
    optimizer.zero_grad(set_to_none=True)
    with torch.autocast("cuda", dtype=torch.float16):   # do the math in 16-bit
        loss = loss_fn(model(xb), yb)
    scaler.scale(loss).backward()
    scaler.step(optimizer)
    scaler.update()`,
cap:'Half-precision math on tensor cores is often a free 2–3× — but always profile first so you fix the real bottleneck.'},
{h:'Rule zero: profile before touching anything',
p:`<p>Intuition about performance is usually wrong. The PyTorch profiler tells you whether time goes to compute, data loading, CPU-GPU transfer, or Python overhead — each has a completely different fix.</p>`,
code:`from torch.profiler import profile, ProfilerActivity, schedule

with profile(activities=[ProfilerActivity.CPU, ProfilerActivity.CUDA],
             schedule=schedule(wait=1, warmup=1, active=3),
             on_trace_ready=torch.profiler.tensorboard_trace_handler("./prof"),
             profile_memory=True) as prof:
    for step, (xb, yb) in enumerate(loader):
        train_step(xb, yb)
        prof.step()
        if step >= 5: break

print(prof.key_averages().table(sort_by="cuda_time_total", row_limit=10))`,
cap:'Gaps between kernels in the trace = your GPU idling. That is where the money is.'},
{h:'Mixed precision: the free 2–3×',
p:`<p>Tensor cores chew fp16/bf16 several times faster than fp32, and activations take half the memory. <code>autocast</code> chooses per-op precision; <code>GradScaler</code> (fp16 only) prevents tiny gradients underflowing to zero. On Ampere+ GPUs, prefer <strong>bf16</strong>: same range as fp32, no scaler needed.</p>`,
code:`scaler = torch.amp.GradScaler()          # fp16 path
for xb, yb in loader:
    optimizer.zero_grad(set_to_none=True)      # cheaper than zeroing
    with torch.autocast("cuda", dtype=torch.float16):
        loss = loss_fn(model(xb), yb)
    scaler.scale(loss).backward()
    scaler.step(optimizer)
    scaler.update()

# bf16: no scaler, just
with torch.autocast("cuda", dtype=torch.bfloat16):
    ...`},
{h:'torch.compile: fusion for free',
p:`<p><code>model = torch.compile(model)</code> traces your model, fuses chains of small ops into single kernels, and removes Python overhead. Typical wins: 1.3–2× training speed, larger on models with many small pointwise ops. First iterations are slow (compilation); dynamic shapes recompile — pad to buckets if your shapes vary wildly.</p>`,
code:`model = torch.compile(model, mode="max-autotune")

# other high-yield knobs
torch.backends.cuda.matmul.allow_tf32 = True   # Ampere+: fast fp32 matmul
loader = DataLoader(ds, num_workers=8, pin_memory=True,
                    persistent_workers=True, prefetch_factor=4)
xb = xb.to(device, non_blocking=True)          # overlap copy & compute`},
{h:'Memory: when CUDA says OOM',
p:`<ul>
<li><strong>Gradient accumulation</strong> — simulate batch 256 with batch 32 × 8 micro-steps (divide loss by 8, step every 8th).</li>
<li><strong>Activation checkpointing</strong> — <code>torch.utils.checkpoint</code>: don't store intermediate activations, recompute them in backward. ~30% slower, dramatically less memory.</li>
<li><strong>set_to_none=True</strong>, delete stray references, and remember: the tensor you keep for logging (<code>losses.append(loss)</code> instead of <code>loss.item()</code>) keeps its <em>entire graph</em> alive. The classic slow memory leak.</li>
</ul>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>Real speed comes from understanding whether you are compute-bound, memory-bound, or overhead-bound — not from cargo-culting tricks.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Horace He's <a href="https://horace.io/brrr_intro.html" target="_blank" rel="noopener">"Making Deep Learning Go Brrrr From First Principles"</a> is the definitive mental model for GPU performance: compute vs memory bandwidth vs overhead, and how to tell which one is actually holding you back before you touch a line of code.</p></div>`}],
quiz:[
{q:'losses.append(loss) instead of loss.item() causes…',o:['nothing','the whole autograd graph per step kept alive → memory leak','wrong loss values','a crash immediately'],a:1,why:'A live tensor holds its grad_fn chain and every saved activation behind it. .item() extracts a float and frees the graph.'},
{q:'bf16 vs fp16: bf16\'s advantage is…',o:['more precision','same exponent range as fp32 → no GradScaler needed','smaller memory','older GPU support'],a:1,why:'bf16 keeps fp32\'s 8 exponent bits, so gradients don\'t underflow; it trades mantissa precision instead.'},
{q:'torch.compile\'s main speed mechanism is…',o:['quantization','kernel fusion + removing Python overhead','pruning','bigger batches'],a:1,why:'It captures the graph and fuses many small ops into few kernels, cutting launch overhead and memory round-trips.'},
{q:'Gradient accumulation over 8 micro-batches requires…',o:['8 optimizers','dividing loss by 8 and stepping every 8th batch','no changes','DDP'],a:1,why:'Backward accumulates into .grad by design (chapter 3!) — scale the loss, step and zero every N batches.'}]},

/* ---------- 15 ADVANCED ARCH ---------- */
{id:'advarch',n:'15',g:'Act IV · Frontier',t:'Advanced Architectures',read:'9 min',
sub:'A field guide past the classics: ViT, graph networks, U-Nets, mixture-of-experts — and the shared tricks that make them tick.',
body:[
{h:'Start here: the same LEGO, new shapes',
p:`<p>Once you know layers, attention, and residual connections, most "advanced" architectures are those same pieces rearranged for a new kind of data. Images become tokens (ViT), graphs pass messages between nodes (GNN), encoder-decoder pairs with skips do per-pixel work (U-Net), and many expert sub-networks share the load (MoE).</p>
<ul>
<li><strong>architecture:</strong> how the layers are wired together.</li>
<li><strong>inductive bias:</strong> the assumptions baked into that wiring.</li>
<li><strong>backbone:</strong> the reusable feature-extractor core of a model.</li>
<li><strong>token:</strong> a single unit the model processes (a patch, a node, a word).</li>
</ul>
<p>Analogy: the same bricks build a castle, a bridge, and a spaceship — what changes is the arrangement, not the parts.</p>`,
code:`import torch
import torch.nn as nn

# turn an image into a sequence of patch "tokens" — the ViT idea
patchify = nn.Conv2d(3, 768, kernel_size=16, stride=16)   # 16×16 patches
x = torch.randn(1, 3, 224, 224)
tokens = patchify(x).flatten(2).transpose(1, 2)
print(tokens.shape)   # (1, 196, 768) -> 196 patch-tokens, ready for a transformer`,
cap:'One strided conv slices a 224×224 image into 196 patch-tokens — an image, re-spoken as a sequence.'},
{h:'Vision Transformers',
p:`<p>Slice an image into 16×16 patches, linearly embed each patch as a "token", prepend a learnable [CLS] token, add positions, feed a standard transformer encoder. With enough data (or good pretraining like DINO/CLIP), attention's global receptive field beats convolution's local prior.</p>`,
code:`class PatchEmbed(nn.Module):
    def __init__(self, img=224, patch=16, d=768):
        super().__init__()
        # a conv with stride=kernel IS patch slicing + embedding
        self.proj = nn.Conv2d(3, d, kernel_size=patch, stride=patch)
    def forward(self, x):                 # (B,3,224,224)
        x = self.proj(x)                  # (B,768,14,14)
        return x.flatten(2).transpose(1, 2)   # (B,196,768) — tokens`},
{h:'Graph Neural Networks',
p:`<p>When data is a graph — molecules, social networks, meshes — GNNs generalise convolution to <strong>message passing</strong>: each node aggregates transformed features from its neighbours, layer by layer. K layers = K-hop receptive field. (In practice, use PyTorch Geometric.)</p>`,
code:`class GCNLayer(nn.Module):
    def __init__(self, d_in, d_out):
        super().__init__()
        self.lin = nn.Linear(d_in, d_out)
    def forward(self, x, adj_norm):        # adj_norm: D^-½(A+I)D^-½
        return F.relu(adj_norm @ self.lin(x))   # aggregate neighbours`},
{h:'U-Net: the dense-prediction workhorse',
p:`<p>Segmentation, depth, and diffusion denoisers need per-pixel output. U-Net pairs a downsampling encoder with an upsampling decoder and — the crucial part — <strong>skip connections at every resolution</strong>, concatenating encoder features into the decoder so fine spatial detail survives the bottleneck.</p>`},
{h:'Mixture of Experts',
p:`<p>Scale parameters without scaling compute: replace each MLP with N expert MLPs plus a learned <strong>router</strong> that sends each token to its top-k experts. A 8×7B MoE has ~47B parameters but the per-token FLOPs of a ~13B dense model. The engineering tax: load-balancing losses so the router doesn't collapse onto favourite experts.</p>`,
code:`class MoE(nn.Module):
    def __init__(self, d, n_exp=8, k=2):
        super().__init__()
        self.router = nn.Linear(d, n_exp)
        self.experts = nn.ModuleList([FeedForward(d) for _ in range(n_exp)])
        self.k = k
    def forward(self, x):                       # x: (tokens, d)
        gates = self.router(x).softmax(-1)      # (tokens, n_exp)
        topv, topi = gates.topk(self.k, dim=-1)
        out = torch.zeros_like(x)
        for slot in range(self.k):              # dispatch per expert
            for e, expert in enumerate(self.experts):
                m = topi[:, slot] == e
                if m.any():
                    out[m] += topv[m, slot, None] * expert(x[m])
        return out`,
cap:'Educational version — production MoE lives or dies on batched expert dispatch and balancing losses.'}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>Mixture-of-Experts is how modern models grow to hundreds of billions of parameters without a matching jump in compute — a pattern worth understanding well.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Hugging Face's <a href="https://huggingface.co/blog/moe" target="_blank" rel="noopener">"Mixture of Experts Explained"</a> covers routing, top-k dispatch and load-balancing losses with clear visuals — the practical companion to the toy MoE in this chapter.</p></div>`}],
quiz:[
{q:'ViT patch embedding is implemented most naturally as…',o:['a for-loop over patches','Conv2d with kernel_size = stride = patch','pooling','an RNN scan'],a:1,why:'A stride-16 16×16 conv computes exactly one linear projection per non-overlapping patch.'},
{q:'K message-passing layers give each node information from…',o:['the whole graph','its K-hop neighbourhood','only itself','random nodes'],a:1,why:'Each layer extends reach by one hop — the graph analogue of receptive field growth.'},
{q:'MoE models decouple…',o:['depth from width','parameter count from per-token compute','training from inference','attention from MLPs'],a:1,why:'Only top-k experts run per token, so total parameters can grow ~N× while FLOPs grow ~k×.'}]},

/* ---------- 16 RL ---------- */
{id:'rl',n:'16',g:'Act IV · Frontier',t:'Reinforcement Learning',read:'9 min',
sub:'No labels, only consequences. An agent acts, the world scores it, and gradients flow through expectations of reward.',
body:[
{h:'Start here: learning from consequences',
p:`<p>There are no labelled answers in reinforcement learning — only an agent trying things in an environment and receiving rewards or penalties. The agent's job is to discover which actions lead to the most reward over time, even when the payoff arrives much later.</p>
<ul>
<li><strong>agent:</strong> the learner and decision-maker. <strong>environment:</strong> the world it acts in.</li>
<li><strong>state:</strong> the current situation. <strong>action:</strong> a choice the agent makes.</li>
<li><strong>reward:</strong> the score signal after an action.</li>
<li><strong>policy:</strong> the agent's strategy, mapping state → action.</li>
<li><strong>return:</strong> the total (discounted) future reward.</li>
</ul>
<p>Analogy: training a dog with treats — there is no answer key, just outcomes that make some behaviours more likely.</p>`,
code:`# the core loop shared by every RL algorithm
state, done = env.reset(), False
while not done:
    action = policy(state)                            # decide
    next_state, reward, done, _ = env.step(action)    # act, then observe
    # ...store (state, action, reward) and later learn from it
    state = next_state`,
cap:'state → action → reward → next state, repeated. Everything else in RL is how you learn from that stream.'},
{h:'The loop and the objective',
p:`<p>State → action → reward → next state, repeat. The agent maximises expected <strong>discounted return</strong> G_t = Σ γᵏ r_{t+k}. Two families: <strong>value-based</strong> (learn how good actions are, act greedily — DQN) and <strong>policy-based</strong> (parameterise the policy directly, ascend its expected return — REINFORCE, PPO).</p>`},
{h:'Policy gradients in one screen',
p:`<p>You cannot differentiate through the environment, but the log-derivative trick gives an estimator anyway: <em>increase the log-probability of actions in proportion to how well things went</em>. Subtracting a baseline (state value) slashes variance without adding bias — that's Advantage Actor-Critic.</p>`,
code:`# REINFORCE with baseline — the conceptual core of policy RL
probs  = policy(states)                       # (T, n_actions)
dist   = torch.distributions.Categorical(probs)
logp   = dist.log_prob(actions)               # (T,)

returns = compute_discounted_returns(rewards, gamma=0.99)
adv     = returns - value_net(states).squeeze()   # advantage

policy_loss = -(logp * adv.detach()).mean()   # ascend: minimise negative
value_loss  = F.mse_loss(value_net(states).squeeze(), returns)
entropy     = dist.entropy().mean()           # exploration bonus

loss = policy_loss + 0.5 * value_loss - 0.01 * entropy
loss.backward()`,
cap:'adv.detach() matters: the advantage weights the policy gradient; it must not receive one itself.'},
{h:'DQN and PPO: the two workhorses',
p:`<ul>
<li><strong>DQN</strong> — Q-network + <em>replay buffer</em> (decorrelate samples) + <em>target network</em> (a slow copy providing stable bootstrap targets). Discrete actions.</li>
<li><strong>PPO</strong> — policy gradient with a <em>clipped ratio</em> objective that forbids destructively large policy updates. The default in continuous control and the algorithm behind RLHF for LLMs.</li>
</ul>`,
code:`# PPO's clipped objective — the whole trick in 4 lines
ratio = torch.exp(logp_new - logp_old)          # π_new / π_old
unclipped = ratio * adv
clipped   = torch.clamp(ratio, 1 - 0.2, 1 + 0.2) * adv
loss = -torch.min(unclipped, clipped).mean()    # pessimistic bound`},
{h:'Why RL is hard',
p:`<div class="gotcha"><span class="g-tag">reality check</span><p>Non-stationary data (the policy changes what it sees), delayed credit assignment, and extreme seed variance. Standard advice: fix seeds, run ≥5 of them, normalise observations and advantages, and suspect your reward function before your algorithm.</p></div>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>RL has a steep vocabulary and many algorithms; one resource teaches both the theory and the code together.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>OpenAI's <a href="https://spinningup.openai.com/en/latest/" target="_blank" rel="noopener">"Spinning Up in Deep RL"</a> is the best free curriculum for the field — clear derivations of policy gradients, plus clean reference implementations of VPG, DQN, PPO and more that mirror the code in this chapter.</p></div>`}],
quiz:[
{q:'The replay buffer in DQN exists to…',o:['save memory','break temporal correlation in training samples','store the policy','speed up envs'],a:1,why:'Consecutive transitions are highly correlated; SGD assumes i.i.d.-ish samples. Random replay restores that.'},
{q:'PPO clips the probability ratio to…',o:['bound memory','prevent destructively large policy updates','make actions discrete','remove the baseline'],a:1,why:'A single huge update can collapse a policy irrecoverably; the clip makes improvement conservative.'},
{q:'In policy_loss = -(logp * adv.detach()).mean(), detach prevents…',o:['NaNs','value-gradient leaking into the policy term','exploration','entropy collapse'],a:1,why:'The advantage is a weight, not a differentiable target here; the value net trains via its own MSE loss.'}]},

/* ---------- 17 MODEL OPT ---------- */
{id:'modelopt',n:'17',g:'Act IV · Frontier',t:'Quantization, Pruning & Distillation',read:'9 min',
sub:'Make it small, make it fast, keep it smart. The compression trio behind every model that runs on a phone.',
body:[
{h:'Start here: smaller, faster, still smart',
p:`<p>A trained model is often far bigger and slower than it needs to be. Three classic techniques shrink it with little accuracy loss: store numbers in fewer bits (<strong>quantization</strong>), delete weights that barely matter (<strong>pruning</strong>), and train a small model to imitate a big one (<strong>distillation</strong>).</p>
<ul>
<li><strong>quantization:</strong> lower-precision weights, e.g. int8 instead of float32.</li>
<li><strong>pruning:</strong> removing individual weights or whole channels.</li>
<li><strong>distillation:</strong> a small "student" learns from a big "teacher".</li>
<li><strong>sparsity:</strong> the fraction of weights that are zero.</li>
</ul>
<p>Analogy: packing for a trip — swap bulky items for compact ones, leave behind what you never use, and let an expert show you the essentials.</p>`,
code:`import torch
import torch.nn as nn

# dynamic quantization: 32-bit weights -> 8-bit, in one line
qmodel = torch.ao.quantization.quantize_dynamic(
    model, {nn.Linear}, dtype=torch.qint8)
# typical result: ~4× smaller on disk, 2–3× faster on CPU, <1% accuracy drop`,
cap:'The easiest win of the trio: one line, no retraining, a measurable speedup — just always verify the accuracy.'},
{h:'Quantization: int8 is (usually) enough',
p:`<p>Store weights (and possibly activations) in 8-bit integers with a scale/zero-point mapping back to float. Three tiers of effort: <strong>dynamic</strong> (weights int8, activations quantized on the fly — one line, great for linear/LSTM-heavy models), <strong>static PTQ</strong> (calibrate activation ranges on sample data), <strong>QAT</strong> (simulate quantization during training with straight-through estimators — best accuracy, most work). LLM-land adds 4-bit weight-only schemes (GPTQ, AWQ, bitsandbytes NF4).</p>`,
code:`# dynamic quantization — the one-liner
qmodel = torch.ao.quantization.quantize_dynamic(
    model, {nn.Linear, nn.LSTM}, dtype=torch.qint8)

# typical outcome: ~4× smaller, 2–3× faster CPU inference,
# accuracy drop usually < 1% — measure it, always.`},
{h:'Pruning: most weights are dead weight',
p:`<p>Trained networks are heavily over-parameterised; removing 80–90% of the smallest-magnitude weights often costs little accuracy after fine-tuning. <strong>Unstructured</strong> pruning (individual weights) gives great compression on paper but needs sparse kernels to get real speed; <strong>structured</strong> pruning (whole channels/heads) yields dense, actually-faster models.</p>`,
code:`import torch.nn.utils.prune as prune

for module in model.modules():
    if isinstance(module, nn.Linear):
        prune.l1_unstructured(module, name="weight", amount=0.8)

# masks are applied via forward hooks; make it permanent:
for module in model.modules():
    if isinstance(module, nn.Linear):
        prune.remove(module, "weight")
# then fine-tune a few epochs to recover accuracy`},
{h:'Distillation: a small student, a big teacher',
p:`<p>Train a small model to match a large model's <em>soft</em> output distribution, not just the hard labels. The teacher's "wrong-class" probabilities (a 3 that's 20% likely to be an 8) carry structure the one-hot label destroys. Temperature softens both distributions so that dark knowledge is visible.</p>`,
code:`def distill_loss(student_logits, teacher_logits, labels, T=4.0, alpha=0.7):
    soft = F.kl_div(
        F.log_softmax(student_logits / T, dim=-1),
        F.softmax(teacher_logits / T, dim=-1),
        reduction="batchmean") * T * T          # gradient scale fix
    hard = F.cross_entropy(student_logits, labels)
    return alpha * soft + (1 - alpha) * hard`,
cap:'The T² factor compensates for the 1/T² the temperature introduces into gradients. Everyone forgets it once.'}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>Compression really matters at inference time for large models, where every technique in this chapter compounds.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Lilian Weng's <a href="https://lilianweng.github.io/posts/2023-01-10-inference-optimization/" target="_blank" rel="noopener">"Large Transformer Model Inference Optimization"</a> surveys quantization, pruning, distillation and sparsity in one place, with the trade-offs and when each actually pays off in practice.</p></div>`}],
quiz:[
{q:'Dynamic quantization quantizes…',o:['weights and activations offline','weights offline, activations on the fly','activations only','gradients'],a:1,why:'Weights are converted once; activation ranges are computed per batch at inference. Zero calibration needed.'},
{q:'Structured beats unstructured pruning for real latency because…',o:['it removes more weights','dense hardware kernels can exploit removed channels','it needs no fine-tuning','it is lossless'],a:1,why:'Random zeros still get multiplied on dense hardware; removing whole channels shrinks the actual matmul.'},
{q:'Distillation temperature T > 1 serves to…',o:['speed training','reveal the teacher\'s inter-class similarity structure','regularise weights','shrink logits for stability'],a:1,why:'Softened distributions expose "dark knowledge" — relative probabilities among wrong classes.'}]},

/* ---------- 18 META ---------- */
{id:'meta',n:'18',g:'Act IV · Frontier',t:'Meta-Learning',read:'8 min',
sub:'Learning to learn: train across many small tasks so that a brand-new task takes five examples, not fifty thousand.',
body:[
{h:'Start here: learning to learn',
p:`<p>Normal training makes a model good at <em>one</em> task. <strong>Meta-learning</strong> makes a model good at picking up <em>new</em> tasks fast — so a brand-new problem takes five examples instead of fifty thousand. It trains across many small tasks and optimises for how quickly it adapts.</p>
<ul>
<li><strong>task:</strong> one small, self-contained learning problem.</li>
<li><strong>support set:</strong> the few labelled examples to learn a new task from.</li>
<li><strong>query set:</strong> the examples the model is then graded on.</li>
<li><strong>few-shot:</strong> learning from only a handful of examples.</li>
<li><strong>adaptation:</strong> quickly adjusting to a new task.</li>
</ul>
<p>Analogy: a seasoned traveller who reads any new city's transit map in minutes — not because this map is easy, but because they have learned dozens before.</p>`,
code:`# a few-shot "episode": N classes, K examples each (the support set)
support_x, support_y = sample_task(n_way=5, k_shot=1)   # 5 classes, 1 example each
query_x,   query_y   = sample_task_queries()            # what we are graded on

# meta-learning trains so that AFTER adapting on (support),
# the model does well on (query) -- across thousands of such episodes.`,
cap:'The model is scored not on raw accuracy, but on accuracy after adapting to a tiny support set.'},
{h:'The few-shot setup',
p:`<p>An N-way K-shot episode: N classes, K labelled examples each (support set), plus queries to classify. Meta-training samples thousands of such episodes; the model is optimised for <em>post-adaptation</em> performance, not raw performance.</p>`},
{h:'MAML: optimise for fine-tunability',
p:`<p>Model-Agnostic Meta-Learning finds initial weights θ such that <strong>one or two gradient steps</strong> on a new task's support set yields good query accuracy. The outer loop differentiates through the inner adaptation — gradients of gradients, which PyTorch handles via <code>create_graph=True</code>.</p>`,
code:`meta_opt = torch.optim.Adam(model.parameters(), lr=1e-3)

for tasks in meta_batches:
    meta_loss = 0
    for support, query in tasks:
        # inner loop: adapt (functionally, keeping the graph)
        fast = {n: p for n, p in model.named_parameters()}
        for _ in range(inner_steps):
            loss = F.cross_entropy(functional_forward(fast, *support[:1]), support[1])
            grads = torch.autograd.grad(loss, fast.values(), create_graph=True)
            fast = {n: p - 0.01 * g for (n, p), g in zip(fast.items(), grads)}
        # outer loss: how good is the ADAPTED model?
        meta_loss += F.cross_entropy(functional_forward(fast, query[0]), query[1])
    meta_opt.zero_grad()
    meta_loss.backward()          # backprops THROUGH the inner updates
    meta_opt.step()`,
cap:'create_graph=True builds a graph of the inner update itself — second-order gradients. Costly; first-order MAML and Reptile skip it and often work nearly as well.'},
{h:'Metric learning: skip the inner loop',
p:`<p><strong>Prototypical Networks</strong>: embed everything, average each class's support embeddings into a prototype, classify queries by nearest prototype. No adaptation gradients at all, embarrassingly effective, the baseline to beat.</p>`,
code:`emb_s = encoder(support_x)               # (N*K, d)
protos = emb_s.view(N, K, -1).mean(1)     # (N, d) — class prototypes
dists  = torch.cdist(encoder(query_x), protos)   # (Q, N)
logits = -dists                            # closer ⇒ larger logit
loss = F.cross_entropy(logits, query_y)`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>Meta-learning splits into a few families (optimization-based, metric-based, model-based); one survey maps them cleanly.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Lilian Weng's <a href="https://lilianweng.github.io/posts/2018-11-30-meta-learning/" target="_blank" rel="noopener">"Meta-Learning: Learning to Learn Fast"</a> lays out MAML, Prototypical Networks and the rest side by side, so you can see exactly how the inner/outer-loop idea in this chapter relates to the metric-based shortcut.</p></div>`}],
quiz:[
{q:'MAML\'s outer objective measures the model…',o:['before adaptation','after a few inner gradient steps on the support set','on training accuracy','on parameter norm'],a:1,why:'The whole point: initial weights are judged by how well they fine-tune, requiring gradients through the update.'},
{q:'Prototypical networks classify a query by…',o:['fine-tuning per episode','distance to the mean support embedding per class','a learned router','decision trees'],a:1,why:'Nearest-prototype in embedding space — no inner-loop optimisation whatsoever.'}]},

/* ---------- 19 NAS ---------- */
{id:'nas',n:'19',g:'Act IV · Frontier',t:'Neural Architecture Search',read:'7 min',
sub:'Let gradient descent design the network too. From reinforcement-learned controllers to DARTS to today\'s hardware-aware search.',
body:[
{h:'Start here: letting the machine design the machine',
p:`<p>Choosing how many layers, which operations, and how wide they are is usually a human guessing game. <strong>Neural Architecture Search (NAS)</strong> automates it: define a space of possible networks, then search that space for the best one — using reinforcement learning, evolution, or gradient descent.</p>
<ul>
<li><strong>search space:</strong> the set of all architectures you allow.</li>
<li><strong>search strategy:</strong> how you explore that space.</li>
<li><strong>candidate operation:</strong> a possible building block, e.g. conv3×3 or pooling.</li>
<li><strong>supernet:</strong> one big network that contains all candidates at once.</li>
<li><strong>proxy:</strong> a cheap way to estimate how good a candidate is without full training.</li>
</ul>
<p>Analogy: instead of designing one house, you specify the allowed rooms and let a program lay out the best floor plan.</p>`,
code:`import torch
import torch.nn as nn

# a "mixed" edge: let training decide which op to keep (the DARTS idea)
ops = nn.ModuleList([nn.Conv2d(8, 8, 3, padding=1), nn.Identity()])
alpha = nn.Parameter(torch.zeros(len(ops)))       # learnable preference

def mixed(x):
    w = alpha.softmax(0)                          # weights over candidate ops
    return sum(wi * op(x) for wi, op in zip(w, ops))`,
cap:'Make the choice of operation continuous (a softmax over candidates) and gradient descent can design the network too.'},
{h:'The three ingredients',
p:`<p>Every NAS method chooses: a <strong>search space</strong> (which architectures are expressible — cells of candidate ops, widths, depths), a <strong>search strategy</strong> (RL controller, evolution, gradient descent), and a <strong>performance estimator</strong> (full training is too slow, so: weight-sharing supernets, few-epoch proxies, or learned predictors).</p>`},
{h:'DARTS: make architecture differentiable',
p:`<p>Put <em>all</em> candidate operations on every edge, mixed by softmaxed architecture weights α. Now the architecture is continuous — train weights w and architecture α jointly by gradient descent, then discretise by keeping each edge's argmax op.</p>`,
code:`class MixedOp(nn.Module):
    def __init__(self, C):
        super().__init__()
        self.ops = nn.ModuleList([
            nn.Conv2d(C, C, 3, padding=1),
            nn.Conv2d(C, C, 5, padding=2),
            nn.MaxPool2d(3, stride=1, padding=1),
            nn.Identity(),
        ])
        self.alpha = nn.Parameter(torch.zeros(len(self.ops)))

    def forward(self, x):
        w = self.alpha.softmax(0)
        return sum(wi * op(x) for wi, op in zip(w, self.ops))`,
cap:'Bilevel in spirit: update α on validation loss, w on training loss — or everything collapses to whatever memorises fastest (often skip-connections; a known DARTS failure mode).'},
{h:'What actually ships',
p:`<p>Production NAS is mostly <strong>hardware-aware</strong>: search spaces of mobile-friendly blocks with latency measured on the target device inside the objective (EfficientNet, MobileNetV3, MCUNet lineage). The honest caveat: a well-tuned hand-designed baseline is brutally hard to beat, and search costs must be amortised over many deployments to pay off.</p>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>NAS spans RL controllers, evolution and differentiable methods — a map helps before diving into any one.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Lilian Weng's <a href="https://lilianweng.github.io/posts/2020-08-06-nas/" target="_blank" rel="noopener">"Neural Architecture Search"</a> organises the whole field around the three ingredients in this chapter — search space, strategy and performance estimation — and explains DARTS and weight-sharing supernets in depth.</p></div>`}],
quiz:[
{q:'DARTS makes search differentiable by…',o:['training every architecture','a softmax-weighted mixture of all candidate ops per edge','evolution','RL controllers'],a:1,why:'Continuous relaxation: architecture parameters α mix ops, so ∂loss/∂α exists and SGD applies.'},
{q:'Weight-sharing supernets exist because…',o:['memory limits','fully training every candidate is computationally impossible','they improve accuracy','hardware requires it'],a:1,why:'Candidates inherit weights from one supernet, making evaluation cheap enough to search at all.'}]},

/* ---------- 20 BAYESIAN ---------- */
{id:'bayesian',n:'20',g:'Act IV · Frontier',t:'Bayesian Deep Learning',read:'8 min',
sub:'A confident wrong answer is worse than an honest "I don\'t know." Networks that output distributions, not just point estimates.',
body:[
{h:'Start here: knowing what you do not know',
p:`<p>A normal classifier always gives an answer, often a confident one, even on inputs it has never seen — which is dangerous in medicine or self-driving. <strong>Bayesian deep learning</strong> makes models report a confidence alongside each prediction, and honestly say "I am not sure."</p>
<ul>
<li><strong>uncertainty:</strong> how unsure the model is about a prediction.</li>
<li><strong>aleatoric:</strong> irreducible noise in the data itself.</li>
<li><strong>epistemic:</strong> the model's own ignorance — reducible with more data.</li>
<li><strong>calibration:</strong> confidence actually matching real accuracy.</li>
<li><strong>posterior:</strong> a distribution over possible models, not a single one.</li>
</ul>
<p>Analogy: a good doctor who says "likely a cold, but I want a test to be sure" instead of guessing with false confidence.</p>`,
code:`# uncertainty for almost free: keep dropout ON and predict many times
model.train()                       # dropout stays active on purpose
with torch.no_grad():
    runs = torch.stack([model(x).softmax(-1) for _ in range(30)])
mean, spread = runs.mean(0), runs.std(0)   # the prediction, and how unsure it is`,
cap:'If 30 dropout-perturbed runs disagree a lot, the model is telling you it is uncertain.'},
{h:'Two kinds of uncertainty',
p:`<p><strong>Aleatoric</strong> — noise in the data itself (blurry image, ambiguous label); more data won't help. <strong>Epistemic</strong> — the model's own ignorance (inputs unlike training data); more data <em>does</em> help, and this is the one that flags out-of-distribution inputs. Standard softmax confidence measures neither reliably: networks are notoriously overconfident far from their training set.</p>`},
{h:'MC Dropout: uncertainty for one extra line',
p:`<p>Keep dropout <em>on at inference</em> and run T stochastic forward passes: the mean is your prediction, the spread is (approximate) epistemic uncertainty. Theoretically a variational approximation; practically the cheapest uncertainty you can buy.</p>`,
code:`def mc_predict(model, x, T=30):
    model.train()                    # keep dropout active — on purpose!
    with torch.no_grad():
        preds = torch.stack([model(x).softmax(-1) for _ in range(T)])
    return preds.mean(0), preds.std(0)      # prediction, uncertainty

# Deep ensembles: same idea, stronger — train 5 models
# from different seeds and average. Consistently the most
# reliable uncertainty in practice, at 5× the cost.`},
{h:'Proper Bayesian layers: weights as distributions',
p:`<p>Bayes-by-backprop learns a mean and variance <em>per weight</em>, sampling weights each forward pass via the reparameterisation trick (chapter 9 rhyme!) and adding a KL term pulling the posterior toward the prior — the ELBO objective. Doubles the parameters, complicates training; used where calibrated uncertainty is the product (medicine, autonomous systems, active learning).</p>`,
code:`class BayesLinear(nn.Module):
    def __init__(self, d_in, d_out):
        super().__init__()
        self.w_mu  = nn.Parameter(torch.randn(d_out, d_in) * 0.05)
        self.w_rho = nn.Parameter(torch.full((d_out, d_in), -4.0))
    def forward(self, x):
        sigma = F.softplus(self.w_rho)               # ensure > 0
        w = self.w_mu + sigma * torch.randn_like(sigma)   # sample weights
        return F.linear(x, w)`},
{h:'Whatever you use: calibrate',
p:`<div class="whybox"><span class="g-tag">the cheap win</span><p><strong>Temperature scaling</strong>: after training, fit one scalar T on validation so that softmax(logits/T) probabilities match empirical frequencies. One parameter, minutes of work, fixes most of a network's overconfidence. Measure with Expected Calibration Error.</p></div>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>The idea that dropout at test time approximates Bayesian inference is subtle — it helps to read it from the source.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Yarin Gal's <a href="http://mlg.eng.cam.ac.uk/yarin/blog_3d801aa532c1ce.html" target="_blank" rel="noopener">"What My Deep Model Doesn't Know"</a> introduces MC Dropout intuitively, showing why standard networks are overconfident far from their training data and how a couple of extra forward passes recover honest uncertainty.</p></div>`}],
quiz:[
{q:'Epistemic uncertainty is the kind that…',o:['comes from label noise','shrinks with more training data and flags OOD inputs','only exists in regression','softmax already captures'],a:1,why:'It reflects model ignorance — reducible with data, and exactly what you want high on inputs unlike training data.'},
{q:'MC Dropout obtains uncertainty by…',o:['ensembling checkpoints','multiple stochastic forward passes with dropout active at test time','temperature scaling','pruning'],a:1,why:'Each pass samples a different thinned network; disagreement across passes approximates epistemic uncertainty.'},
{q:'Temperature scaling changes…',o:['accuracy and calibration','calibration only — argmax is unchanged','the architecture','training dynamics'],a:1,why:'Dividing logits by a scalar preserves their order (same predictions) while reshaping confidence.'}]},

/* ---------- 21 RESEARCH ---------- */
{id:'research',n:'21',g:'Act IV · Frontier',t:'Research Frontiers',read:'8 min',
sub:'The syllabus ends; the field doesn\'t. A map of where the interesting problems live, and how to read your way into them.',
body:[
{h:'Start here: the syllabus ends, the field does not',
p:`<p>You now hold the full stack: tensors, autograd, training, the big architectures, scaling, and compression. The <strong>frontier</strong> is where these combine and break in new ways — self-supervised pretraining, ever-cheaper attention, and adapting giant models on a budget. The final skill is learning to read your way into new work.</p>
<ul>
<li><strong>self-supervised learning:</strong> labels created from the data itself, no humans.</li>
<li><strong>foundation model:</strong> a large pretrained model reused across many tasks.</li>
<li><strong>fine-tuning:</strong> lightly adapting a pretrained model to your task.</li>
<li><strong>parameter-efficient tuning:</strong> adapting with a tiny number of new weights (e.g. LoRA).</li>
</ul>
<p>Analogy: you have finished driving school; the open road is where you actually become a driver.</p>`,
code:`# LoRA: freeze the big pretrained weight, train a tiny low-rank add-on
A = torch.nn.Parameter(torch.randn(8, 768) * 0.01)   # rank-8 "down" projection
B = torch.nn.Parameter(torch.zeros(768, 8))          # rank-8 "up" (starts at 0)

def adapted(x, base_linear):
    return base_linear(x) + (x @ A.T @ B.T)          # base stays frozen; only A,B learn`,
cap:'Training under 1% of the parameters (just A and B) can rival full fine-tuning — how giant models get adapted on one GPU.'},
{h:'Self-supervised learning: labels are a bottleneck',
p:`<p>The pretraining revolution: design a task where the data labels itself. Masked prediction (BERT, MAE: hide patches/tokens, reconstruct), contrastive learning (SimCLR/CLIP: pull augmented views or matched image-text pairs together, push others apart), and self-distillation (DINO). This is why "foundation model + light fine-tune" replaced "train from scratch" as the default workflow you learned in chapter 6.</p>`,
code:`# the InfoNCE contrastive loss at the heart of SimCLR/CLIP
def info_nce(z1, z2, tau=0.07):
    z1, z2 = F.normalize(z1, dim=-1), F.normalize(z2, dim=-1)
    logits = z1 @ z2.T / tau              # (B, B) similarity matrix
    labels = torch.arange(z1.size(0), device=z1.device)
    return F.cross_entropy(logits, labels)   # diagonal = positives`},
{h:'The efficiency frontier',
p:`<p>Attention's O(T²) wall (chapter 8) spawned an ecosystem: FlashAttention (exact, IO-aware kernels), sliding-window and sparse attention, <strong>state-space models</strong> (Mamba-style selective SSMs: linear-time sequence modelling), and aggressive quantization/KV-cache compression for inference. Parameter-efficient fine-tuning — <strong>LoRA</strong> chief among them — made adapting billion-parameter models a consumer-GPU activity:</p>`,
code:`class LoRALinear(nn.Module):
    """W stays frozen; train a rank-r update: W + (B @ A) * scale."""
    def __init__(self, base: nn.Linear, r=8, alpha=16):
        super().__init__()
        self.base = base
        for p in self.base.parameters():
            p.requires_grad = False
        self.A = nn.Parameter(torch.randn(r, base.in_features) * 0.01)
        self.B = nn.Parameter(torch.zeros(base.out_features, r))
        self.scale = alpha / r
    def forward(self, x):
        return self.base(x) + (x @ self.A.T @ self.B.T) * self.scale`,
cap:'B initialised to zero ⇒ training starts exactly at the pretrained model. Elegant.'},
{h:'Open problems worth your career',
p:`<ul>
<li><strong>Reasoning & planning</strong> — test-time compute, search + learning hybrids, process supervision.</li>
<li><strong>Multimodality</strong> — unified tokenisers for text/image/audio/video/action; world models.</li>
<li><strong>Alignment & interpretability</strong> — RLHF and successors; mechanistic interpretability of circuits inside trained networks.</li>
<li><strong>Data</strong> — curation, synthetic data flywheels, and contamination: increasingly <em>the</em> lever, more than architecture.</li>
<li><strong>Continual learning</strong> — escaping catastrophic forgetting without full retraining.</li>
</ul>`},
{h:'How to keep learning',
p:`<p>Re-implement one important paper per month in raw PyTorch — everything you've built here (attention, VAEs, LoRA, PPO) is a paper re-implementation in miniature. Read code before papers when both exist. And keep the chapter-4 ritual forever: overfit one batch first. Researchers at every level still get caught by shape bugs; the ones who ship are the ones who test.</p>
<div class="whybox"><span class="g-tag">you made it</span><p>You now hold the full stack: tensors → autograd → training → architectures → scale → frontier. The playground stays open — go break things.</p></div>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>The frontier moves fast; the durable skill is a habit for keeping up without drowning.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Sebastian Raschka's <a href="https://magazine.sebastianraschka.com/" target="_blank" rel="noopener">"Ahead of AI"</a> distills the latest research and techniques into readable, code-adjacent explanations — an ideal standing subscription for turning the fire-hose of new papers into things you can actually use.</p></div>`}],
quiz:[
{q:'In InfoNCE, the positives live…',o:['in a separate batch','on the diagonal of the similarity matrix','in the largest logits','nowhere — it\'s unsupervised'],a:1,why:'Row i\'s match is column i (the paired view); cross-entropy with labels=arange makes diagonals the targets.'},
{q:'LoRA trains…',o:['all weights at low precision','a small low-rank additive update while the base stays frozen','only the last layer','the optimizer state'],a:1,why:'ΔW = B·A with rank r ≪ d cuts trainable params by ~1000× while matching full fine-tuning surprisingly often.'},
{q:'Initialising LoRA\'s B to zero guarantees…',o:['faster convergence','the model starts identical to the pretrained one','orthogonality','sparsity'],a:1,why:'B·A = 0 at step 0, so the adapted model equals the base model exactly — training departs smoothly from it.'}]}
);

/* =====================================================
   RENDER — sidebar, home, chapters, quiz, router
   ===================================================== */
const GROUPS=[...new Set(CH.map(c=>c.g))];
function renderSidebar(){
  const sb=$('#sidebar');
  let h=`<button class="side-home" onclick="location.hash='#/'">⌂ &nbsp;Playground home</button>
  <button class="side-home" id="blogTab" onclick="location.hash='#/blogs'">▤ &nbsp;Reading list &nbsp;<span class="mono" style="margin-left:auto;color:var(--ink-faint)">${collectBlogs().length}</span></button>`;
  for(const g of GROUPS){
    const chs=CH.filter(c=>c.g===g);
    const done=chs.filter(c=>state.done.has(c.id)).length;
    h+=`<div class="act"><div class="act-head"><span>${g}</span><b>${done}/${chs.length}</b></div>`;
    for(const c of chs){
      h+=`<button class="ch-link" data-ch="${c.id}">
        <span class="ch-num">${c.n}</span>
        <span class="ch-title-s">${c.t}</span>
        <span class="ch-dot ${state.done.has(c.id)?'done':''}"></span></button>`;
    }
    h+='</div>';
  }
  sb.innerHTML=h;
  $$('.ch-link',sb).forEach(b=>b.addEventListener('click',()=>{
    location.hash='#/ch/'+b.dataset.ch;
    $('#sidebar').classList.remove('open');
  }));
}
function markActive(id){
  $$('.ch-link').forEach(b=>b.classList.toggle('active',b.dataset.ch===id));
  const bt=$('#blogTab');
  if(bt){
    const on=id==='__blogs__';
    bt.style.borderColor=on?'var(--ember)':'var(--ink)';
    bt.style.background=on?'var(--ember-soft)':'var(--card)';
  }
}

/* ---------- reading list (blogs collected from every chapter) ---------- */
function collectBlogs(){
  const out=[], tmp=document.createElement('div');
  for(const c of CH){
    for(const s of [...(c.body||[]),...(c.after||[])]){
      if(s.h!=='One blog to bookmark' || !s.p) continue;
      tmp.innerHTML=s.p;
      const a=tmp.querySelector('a'), box=tmp.querySelector('.whybox p');
      if(!a) continue;
      out.push({ch:c, url:a.href, title:a.textContent.trim(),
                desc:box?box.textContent.trim():''});
    }
  }
  return out;
}
function renderBlogs(){
  const m=$('#main');
  const blogs=collectBlogs();
  let h=`
  <div class="eyebrow">Reading list · ${blogs.length} hand-picked blogs</div>
  <h1 class="ch-h">The Reading List</h1>
  <p class="ch-sub">One outstanding external read per chapter — the blogs and guides that make each topic click. Every link opens in a new tab; the playground stays right here.</p>`;
  for(const g of GROUPS){
    const items=blogs.filter(b=>b.ch.g===g);
    if(!items.length) continue;
    h+=`<h2 class="sec-h"><span class="sec-idx">▲</span>${g}</h2><div class="home-grid">`;
    for(const b of items){
      h+=`<a class="act-card" href="${b.url}" target="_blank" rel="noopener" style="text-decoration:none;color:var(--ink)">
        <small>chapter ${b.ch.n} · ${b.ch.t}</small>
        <h3>${b.title}</h3>
        <p>${b.desc}</p>
        <span class="cnt">read the blog →</span></a>`;
    }
    h+='</div>';
  }
  m.innerHTML=h;
  markActive('__blogs__');
  window.scrollTo({top:0});
}

function renderHome(){
  const m=$('#main');
  m.innerHTML=`
  <div class="hero">
    <span class="hero-kicker">▲ 21 chapters · 5 live labs · 0 setup</span>
    <h1>Learn PyTorch the way PyTorch learns: <span class="u">by backpropagating.</span></h1>
    <p class="lead">Reading about gradients never made anyone good at them. Below is a <b>real computational graph</b> — drag the weights, call <b>backward()</b>, take an optimizer step. Everything on this page runs live in your browser, from broadcasting rules to a trainable neural network.</p>
  </div>
  <div id="heroTape"></div>
  <div class="how-strip">
    <div class="how"><b>read</b><h4>Opinionated theory</h4><p>Short, sharp chapters built around the gotchas that actually bite.</p></div>
    <div class="how"><b>run</b><h4>Live labs</h4><p>Broadcasting, autograd, a trainable MLP, convolution, attention — all interactive.</p></div>
    <div class="how"><b>prove it</b><h4>Checkpoints</h4><p>Every chapter ends with a quiz. Correct answers pay XP.</p></div>
    <div class="how"><b>rank up</b><h4>Novice → Grandmaster</h4><p>Six ranks between you and Grandmaster of Gradients.</p></div>
  </div>
  <h2 class="home-h">The curriculum</h2>
  <p class="home-sub">Four acts, in dependency order. Skipping ahead is allowed and encouraged — the sidebar never judges.</p>
  <div class="home-grid">${GROUPS.map(g=>{
    const chs=CH.filter(c=>c.g===g);
    const blurb={
      'Act I · Foundations':'Tensors, modules, autograd, the training loop, data. The 20% that powers everything.',
      'Act II · Architectures':'CNNs, RNNs, transformers, and three ways to make networks dream.',
      'Act III · Production':'Deployment, Lightning, distributed training, custom kernels, speed.',
      'Act IV · Frontier':'RL, compression, meta-learning, NAS, uncertainty, and the open problems.'
    }[g];
    return `<button class="act-card" data-go="${chs[0].id}">
      <small>${g}</small><h3>${chs[0].n}–${chs[chs.length-1].n}</h3>
      <p>${blurb}</p>
      <span class="cnt">${chs.map(c=>c.t).join(' · ')}</span></button>`;
  }).join('')}</div>
  <h2 class="home-h">The reading list</h2>
  <p class="home-sub">Theory here is opinionated and short. When you want to go deeper, every chapter points to one outstanding blog or guide from the wider community — gathered into a single tab.</p>
  <button class="pg" id="blogPromo" style="width:100%;display:flex;align-items:center;gap:16px;margin-top:10px">
    <span style="font-size:24px;line-height:1">▤</span>
    <span style="flex:1;min-width:0">
      <small>reading list · ${collectBlogs().length} hand-picked blogs</small>
      <b>Browse the reading list →</b>
    </span>
  </button>
  <p class="session-note">▲ progress &amp; XP live in this session only — this playground keeps no data about you.</p>`;
  mountTapeLab($('#heroTape'),{hero:true});
  $$('.act-card',m).forEach(b=>b.addEventListener('click',()=>location.hash='#/ch/'+b.dataset.go));
  $('#blogPromo',m).addEventListener('click',()=>location.hash='#/blogs');
  markActive(null);
}

function sectionHTML(s,idx){
  let h='';
  if(s.h) h+=`<h2 class="sec-h"><span class="sec-idx">§${idx}</span>${s.h}</h2>`;
  if(s.p) h+=`<div class="prose">${s.p}</div>`;
  if(s.code) h+=codeCard(s.code, (s.h||'snippet').toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,24)+'.py');
  if(s.cap) h+=`<p class="code-cap">↳ ${s.cap}</p>`;
  return h;
}
function renderChapter(id){
  const c=CH.find(x=>x.id===id);
  if(!c){renderHome();return;}
  const i=CH.indexOf(c), prev=CH[i-1], next=CH[i+1];
  const m=$('#main');
  let secIdx=1;
  let h=`
  <div class="eyebrow">${c.g} · chapter ${c.n}</div>
  <h1 class="ch-h">${c.t}</h1>
  <p class="ch-sub">${c.sub}</p>
  <div class="ch-meta"><span>⏱ <b>${c.read}</b> read</span><span>◆ <b>${c.widget?'1 live lab':'theory + code'}</b></span><span>✓ <b>${c.quiz.length} checkpoint Qs</b></span></div>`;
  for(const s of c.body) h+=sectionHTML(s,secIdx++);
  if(c.widget) h+=`<div id="labMount"></div>`;
  for(const s of (c.after||[])) h+=sectionHTML(s,secIdx++);
  // quiz
  h+=`<div class="quiz"><div class="quiz-bar"><b>Checkpoint</b><span>+30 XP per correct</span></div>
    ${c.quiz.map((q,qi)=>`<div class="qq" data-q="${qi}">
      <div class="qq-q"><span class="qn">Q${qi+1}</span><span>${q.q}</span></div>
      ${q.o.map((o,oi)=>`<label class="opt"><input type="radio" name="q${qi}" value="${oi}"><span>${o}</span></label>`).join('')}
      <div class="qq-why">✓ ${q.why}</div>
    </div>`).join('')}
    <div class="quiz-foot"><button class="btn ember" id="gradeBtn">Grade my checkpoint</button><span class="quiz-score" id="quizScore"></span></div>
  </div>
  <div class="ch-foot">
    <button class="btn complete-btn ${state.done.has(c.id)?'ghost':''}" id="doneBtn">${state.done.has(c.id)?'✓ chapter complete':'Mark chapter complete · +40 XP'}</button>
    <div class="pager">
      ${prev?`<button class="pg" data-go="${prev.id}"><small>← previous</small><b>${prev.n} · ${prev.t}</b></button>`:'<span style="flex:1"></span>'}
      ${next?`<button class="pg next" data-go="${next.id}"><small>next →</small><b>${next.n} · ${next.t}</b></button>`:''}
    </div>
  </div>`;
  m.innerHTML=h;
  if(c.widget) WIDGETS[c.widget]($('#labMount'));
  markActive(id);
  window.scrollTo({top:0});

  $('#gradeBtn').addEventListener('click',()=>{
    let right=0,answeredAll=true;
    c.quiz.forEach((q,qi)=>{
      const sel=$(`input[name=q${qi}]:checked`,m);
      const box=$(`.qq[data-q="${qi}"]`,m);
      $$('.opt',box).forEach(o=>o.classList.remove('right','wrong'));
      if(!sel){answeredAll=false;return;}
      const oi=+sel.value;
      const opts=$$('.opt',box);
      opts[q.a].classList.add('right');
      if(oi===q.a){right++;}
      else opts[oi].classList.add('wrong');
      $('.qq-why',box).classList.add('show');
    });
    const key=c.id+':quiz';
    let msg=`${right}/${c.quiz.length} correct.`;
    if(!answeredAll) msg+=' (answer everything for the full grade)';
    if(right>0 && !state.answered.has(key)){
      state.answered.add(key);
      addXP(right*30);
      msg+=` +${right*30} XP`;
    } else if(state.answered.has(key)){
      msg+=' — XP already banked for this checkpoint.';
    }
    $('#quizScore').textContent=msg;
  });
  $('#doneBtn').addEventListener('click',e=>{
    if(state.done.has(c.id))return;
    state.done.add(c.id); addXP(40);
    e.target.textContent='✓ chapter complete'; e.target.classList.add('ghost');
    renderSidebar(); markActive(id);
  });
  $$('.pg',m).forEach(b=>b.addEventListener('click',()=>location.hash='#/ch/'+b.dataset.go));
}

/* ---------- router ---------- */
function route(){
  const h=location.hash;
  const mch=h.match(/^#\/ch\/([\w-]+)/);
  if(/^#\/blogs/.test(h)) renderBlogs();
  else if(mch) renderChapter(mch[1]);
  else renderHome();
}
window.addEventListener('hashchange',route);
$('#menuBtn').addEventListener('click',()=>$('#sidebar').classList.toggle('open'));
document.addEventListener('click',e=>{
  if(innerWidth<=980 && !e.target.closest('.sidebar') && !e.target.closest('.menu-btn'))
    $('#sidebar').classList.remove('open');
});

renderSidebar();
renderXP();
route();
</script>
