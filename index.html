/* ---------- 07 RNN ---------- */
{id:'rnn',n:'07',g:'Act II · Architectures',t:'Recurrent Networks',read:'9 min',
sub:'A loop with memory: RNNs read sequences one step at a time, carrying a hidden state. Transformers took the crown, but gated recurrence still runs the streaming world — and its ideas are everywhere.',
body:[
{h:'Start here: networks with a memory',
p:`<p>Some data arrives in order — words in a sentence, prices over days, notes in a melody — and that order carries meaning. A <strong>recurrent network</strong> reads a sequence one step at a time and keeps a running memory (the hidden state) that it updates at every step, like reading a book and remembering the plot so far.</p>
<ul>
<li><strong>sequence:</strong> an ordered list of inputs.</li>
<li><strong>timestep:</strong> one item in the sequence.</li>
<li><strong>hidden state:</strong> the memory carried forward from step to step.</li>
<li><strong>recurrence:</strong> reusing the <em>same</em> cell at every timestep.</li>
</ul>
<p>Analogy: reading a sentence word by word — your understanding at word 7 depends on words 1–6, held in your head.</p>`,
code:`import torch
import torch.nn as nn

rnn = nn.RNN(input_size=8, hidden_size=16, batch_first=True)
x = torch.randn(2, 5, 8)      # 2 sequences, 5 timesteps, 8 features each
out, h = rnn(x)
print(out.shape)   # (2, 5, 16) -> the memory at every timestep
print(h.shape)     # (1, 2, 16) -> the final memory per sequence`,
cap:'The same cell runs at each of the 5 timesteps, passing its hidden state forward like a baton.'},
{h:'The recurrence',
p:`<p>An RNN applies the <em>same</em> cell at every timestep: <code>h_t = tanh(W_ih·x_t + W_hh·h_{t−1} + b)</code>. The hidden state is a running summary of everything read so far. Backprop through a sequence unrolls this loop — "backpropagation through time" — which means gradients are multiplied by <code>W_hh</code> once per step. Powers of a matrix either explode or vanish; long-range memory dies.</p>`,
code:`rnn = nn.RNN(input_size=32, hidden_size=64,
             num_layers=2, batch_first=True)

x = torch.randn(8, 100, 32)        # (batch, seq_len, features)
out, h_n = rnn(x)
print(out.shape)   # (8, 100, 64) — hidden state at EVERY step
print(h_n.shape)   # (2, 8, 64)  — final state per layer`,
cap:'batch_first=True or you will spend an afternoon confused about (seq, batch, feat). Everyone does it once.'},
{h:'LSTM & GRU: gates against forgetting',
p:`<p>The LSTM adds a <strong>cell state</strong> — a conveyor belt modified only by element-wise gates: <em>forget</em> (what to erase), <em>input</em> (what to write), <em>output</em> (what to reveal as h_t). Because the belt's gradient path is multiplicative-by-gates rather than by <code>W_hh</code> repeatedly, memory survives hundreds of steps. The GRU fuses gates into a lighter two-gate design — usually similar accuracy, fewer parameters, pick by benchmark.</p>`,
code:`lstm = nn.LSTM(32, 64, num_layers=2, batch_first=True,
               dropout=0.2, bidirectional=True)
out, (h_n, c_n) = lstm(x)      # note: LSTM returns (h, c) tuple
print(out.shape)               # (8, 100, 128) — 2×64, both directions

# classification head: use the last timestep (or pool)
logits = classifier(out[:, -1, :])`},
{h:'Variable lengths, clipping, and reality',
p:`<p>Real sequences have real lengths. Pad to a common length, then <code>pack_padded_sequence</code> so the RNN skips pad tokens instead of hallucinating on them. And clip gradients — exploding gradients aren't a theoretical concern in RNNs, they're a Tuesday.</p>`,
code:`from torch.nn.utils.rnn import pack_padded_sequence, pad_packed_sequence

packed = pack_padded_sequence(x_padded, lengths,
                              batch_first=True, enforce_sorted=False)
out_packed, (h, c) = lstm(packed)
out, _ = pad_packed_sequence(out_packed, batch_first=True)

torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)  # non-negotiable`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>The leap from a plain RNN to an LSTM is best understood with pictures of the gates in action.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Christopher Olah's <a href="https://colah.github.io/posts/2015-08-Understanding-LSTMs/" target="_blank" rel="noopener">"Understanding LSTM Networks"</a> is the definitive, diagram-driven walkthrough of the cell state and its forget/input/output gates — the clearest explanation of why gated recurrence remembers where vanilla RNNs forget.</p></div>`}],
quiz:[
{q:'Vanilla RNN gradients over long sequences tend to…',o:['stay stable','vanish or explode via repeated W_hh multiplication','oscillate harmlessly','become sparse'],a:1,why:'BPTT multiplies by W_hh per step; eigenvalues <1 vanish, >1 explode. This is the problem gates solve.'},
{q:'The LSTM cell state fixes this via…',o:['a bigger W_hh','an additive, gate-controlled path for gradients','skip connections to input','ReLU'],a:1,why:'The conveyor belt is updated by element-wise gated add/scale, not repeated dense matmuls — gradients survive.'},
{q:'nn.LSTM returns…',o:['out only','(out, h_n)','(out, (h_n, c_n))','(h_n, c_n)'],a:2,why:'LSTMs carry both hidden and cell state; the second return is the tuple. RNN/GRU return (out, h_n).'}]},

/* ---------- 08 TRANSFORMERS ---------- */
{id:'attention',n:'08',g:'Act II · Architectures',t:'Attention & Transformers',read:'12 min',
sub:'Ditch the loop: let every token look at every other token at once, and let the network learn where to look. This is the architecture eating the world.',
body:[
{h:'Start here: letting words look at each other',
p:`<p>To understand "it" in "the robot drank the battery because it was empty," a model must let "it" look back at "battery." <strong>Attention</strong> is exactly that: every word (token) looks at every other word and decides how much to borrow from each. There is no looping through the sentence — all the looking happens at once, in parallel.</p>
<ul>
<li><strong>token:</strong> a chunk of input, roughly a word.</li>
<li><strong>query:</strong> what a token is looking for.</li>
<li><strong>key:</strong> what a token advertises as a match.</li>
<li><strong>value:</strong> the content a token hands over when attended to.</li>
<li><strong>attention weight:</strong> how strongly one token attends to another.</li>
</ul>
<p>Analogy: a room of people; each person asks a question (query), everyone signals how relevant they are (keys), and then shares notes (values) in proportion to that relevance.</p>`,
code:`import torch
import torch.nn.functional as F

# 3 tokens, each a 4-dim vector (using q=k=v for simplicity)
q = k = v = torch.randn(3, 4)
scores  = q @ k.T / (4 ** 0.5)        # how much each token matches each other
weights = F.softmax(scores, dim=-1)   # turn scores into blend ratios (rows sum to 1)
out     = weights @ v                 # each token becomes a weighted blend of values
print(weights.shape, out.shape)       # (3, 3) (3, 4)`,
cap:'The (3,3) weight matrix is the whole story: row i says how much token i attends to every token.'},
{h:'Attention is a soft dictionary lookup',
p:`<p>Each token emits a <strong>query</strong> ("what am I looking for?"), a <strong>key</strong> ("what do I contain?") and a <strong>value</strong> ("what do I give you if you attend to me"). Scores are dot products Q·Kᵀ, scaled by √d_k (so softmax doesn't saturate as dimensions grow), softmaxed into weights, and used to blend values. One matrix multiply chain, fully parallel, no recurrence:</p>`,
code:`import torch, math
import torch.nn.functional as F

def scaled_dot_product_attention(q, k, v, mask=None):
    # q,k,v: (B, heads, seq, d_k)
    scores = q @ k.transpose(-2, -1) / math.sqrt(q.size(-1))
    if mask is not None:
        scores = scores.masked_fill(mask == 0, float("-inf"))
    attn = F.softmax(scores, dim=-1)
    return attn @ v, attn`,
cap:'In production use F.scaled_dot_product_attention — it dispatches to FlashAttention kernels automatically.'},
{h:'Feel it',
p:`<p>Below, each head has learned a different <em>relationship</em>. Head 1 tracks local syntax; head 2 has learned coreference. Click <span class="mono">it</span>.</p>`},
],
widget:'attn',
after:[
{h:'Multi-head: many relationships at once',
p:`<p>One attention pattern per layer is too few — language has syntax, coreference, position, semantics simultaneously. So we split d_model into h heads, run attention independently in each subspace, concatenate, and mix with an output projection. Same FLOPs as one big head, h different learned "relations".</p>`,
code:`class MultiHeadAttention(nn.Module):
    def __init__(self, d_model=512, n_heads=8):
        super().__init__()
        assert d_model % n_heads == 0
        self.h, self.d_k = n_heads, d_model // n_heads
        self.qkv  = nn.Linear(d_model, 3 * d_model)
        self.proj = nn.Linear(d_model, d_model)

    def forward(self, x, mask=None):
        B, T, D = x.shape
        q, k, v = self.qkv(x).chunk(3, dim=-1)
        # (B,T,D) → (B, heads, T, d_k)
        shape = lambda t: t.view(B, T, self.h, self.d_k).transpose(1, 2)
        out = F.scaled_dot_product_attention(shape(q), shape(k), shape(v),
                                             attn_mask=mask)
        out = out.transpose(1, 2).contiguous().view(B, T, D)
        return self.proj(out)`},
{h:'The transformer block',
p:`<p>A block = attention (tokens talk to each other) + position-wise MLP (each token thinks alone), each wrapped in a residual connection and layer norm. Modern stacks put the norm <em>before</em> each sublayer (pre-LN) — it trains far more stably. Because attention is permutation-invariant, position must be injected explicitly: learned embeddings, sinusoids, or rotary (RoPE) in current LLMs.</p>`,
code:`class Block(nn.Module):
    def __init__(self, d=512, heads=8, ff=2048, p=0.1):
        super().__init__()
        self.ln1 = nn.LayerNorm(d)
        self.attn = MultiHeadAttention(d, heads)
        self.ln2 = nn.LayerNorm(d)
        self.mlp = nn.Sequential(
            nn.Linear(d, ff), nn.GELU(),
            nn.Dropout(p), nn.Linear(ff, d))

    def forward(self, x, mask=None):
        x = x + self.attn(self.ln1(x), mask)   # pre-LN residual
        x = x + self.mlp(self.ln2(x))
        return x`},
{h:'Decoders, masks, and why GPT can\'t peek',
p:`<p>A <strong>causal mask</strong> zeroes attention to future positions — that single triangular matrix is what turns a transformer into an autoregressive language model. Encoders (BERT-style) see everything and excel at understanding; decoders (GPT-style) predict the next token; ViT chops images into 16×16 patch-tokens and feeds them to an encoder, no convolutions required.</p>
<div class="gotcha"><span class="g-tag">gotcha</span><p>Attention is O(T²) in sequence length — in both compute and memory. Doubling context quadruples cost. This is why FlashAttention, sliding windows, and KV-caching exist, and why long-context models are an engineering discipline of their own.</p></div>`,
code:`T = x.size(1)
causal = torch.tril(torch.ones(T, T, dtype=torch.bool, device=x.device))
out = block(x, mask=causal)     # position t sees only ≤ t`},
{h:'One blog to bookmark',
p:`<p>Transformers have many moving parts; one illustrated guide lines them all up in order.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Jay Alammar's <a href="https://jalammar.github.io/illustrated-transformer/" target="_blank" rel="noopener">"The Illustrated Transformer"</a> animates queries, keys, values, multi-head attention and positional encoding step by step. It is the single most-recommended on-ramp to the architecture eating the world.</p></div>`}],
quiz:[
{q:'The √d_k scaling exists because…',o:['it normalises values','large dot products saturate softmax → dead gradients','it speeds matmul','it prevents overflow only'],a:1,why:'Dot products grow with dimension; huge logits make softmax one-hot and its gradient ~0. Scaling keeps it soft.'},
{q:'Multi-head attention lets the model…',o:['see longer sequences','attend to different relation types in parallel subspaces','skip layer norm','use fewer FLOPs'],a:1,why:'Each head is attention in its own projected subspace — syntax in one, coreference in another, as the lab shows.'},
{q:'Transformers need positional encodings because…',o:['GPUs require it','attention is permutation-invariant','embeddings are random','masks delete positions'],a:1,why:'Without injected position, "robot drank battery" and "battery drank robot" produce identical attention math.'},
{q:'Self-attention cost scales with sequence length T as…',o:['O(T)','O(T log T)','O(T²)','O(1) with KV cache'],a:2,why:'Every token scores against every token: T×T matrix. This quadratic wall drives most modern attention research.'}]},

/* ---------- 09 GENERATIVE ---------- */
{id:'generative',n:'09',g:'Act II · Architectures',t:'Generative Models',read:'11 min',
sub:'Three ways to teach a network to dream: compress and decode (VAE), duel (GAN), or denoise backwards from static (diffusion).',
body:[
{h:'Start here: models that create, not classify',
p:`<p>Most networks answer "what is this?" <strong>Generative models</strong> answer "make me a new one." Instead of mapping an image to a label, they learn the shape of the data itself, so they can sample brand-new examples that look real.</p>
<ul>
<li><strong>generative model:</strong> learns to produce data, not just label it.</li>
<li><strong>latent space:</strong> a compact "idea space" of codes you can sample from.</li>
<li><strong>sampling:</strong> drawing a fresh example (often from random noise).</li>
<li><strong>reconstruction:</strong> rebuilding an input from its compressed code.</li>
</ul>
<p>Analogy: a classifier is a critic naming paintings; a generative model is the painter.</p>`,
code:`import torch
import torch.nn as nn

# a decoder: turn a short random "idea" vector into a 28×28 image
decoder = nn.Sequential(nn.Linear(16, 256), nn.ReLU(), nn.Linear(256, 28 * 28))

z = torch.randn(1, 16)            # sample a random idea from latent space
fake = decoder(z).view(28, 28)
print(fake.shape)                 # torch.Size([28, 28]) -> a freshly dreamed image`,
cap:'Sampling a random z and decoding it is, at heart, how VAEs, GANs and diffusion all produce new data.'},
{h:'VAE: a probabilistic bottleneck',
p:`<p>An autoencoder squeezes data through a small latent code. A <strong>variational</strong> autoencoder makes that code a distribution — the encoder outputs a mean and variance, we sample, the decoder reconstructs. The loss is reconstruction + a KL term pulling the latent space toward N(0, I), which is what makes the space smooth enough to sample from. Gradients flow through sampling via the <strong>reparameterisation trick</strong>: z = μ + σ·ε.</p>`,
code:`class VAE(nn.Module):
    def __init__(self, d_in=784, d_z=32):
        super().__init__()
        self.enc = nn.Sequential(nn.Linear(d_in, 400), nn.ReLU())
        self.mu, self.logvar = nn.Linear(400, d_z), nn.Linear(400, d_z)
        self.dec = nn.Sequential(nn.Linear(d_z, 400), nn.ReLU(),
                                 nn.Linear(400, d_in))

    def forward(self, x):
        h = self.enc(x)
        mu, logvar = self.mu(h), self.logvar(h)
        z = mu + torch.exp(0.5 * logvar) * torch.randn_like(mu)  # reparam
        return self.dec(z), mu, logvar

def vae_loss(recon, x, mu, logvar):
    rec = F.binary_cross_entropy_with_logits(recon, x, reduction="sum")
    kld = -0.5 * torch.sum(1 + logvar - mu.pow(2) - logvar.exp())
    return rec + kld`},
{h:'GAN: learning by forgery',
p:`<p>A <strong>generator</strong> maps noise to fakes; a <strong>discriminator</strong> learns to spot them; each gradient step makes the other's job harder. Trained to equilibrium, the generator's fakes are indistinguishable from data. GANs produce sharp samples but train like a knife fight: mode collapse (G finds one fake that always works), oscillation, vanishing D signal.</p>`,
code:`# one GAN step — note the TWO optimizers and detach()
d_opt.zero_grad()
real_loss = bce(D(x_real), torch.ones(B, 1))
fake = G(torch.randn(B, z_dim))
fake_loss = bce(D(fake.detach()), torch.zeros(B, 1))  # detach: don't train G here
(real_loss + fake_loss).backward()
d_opt.step()

g_opt.zero_grad()
fake  = G(torch.randn(B, z_dim))
g_loss = bce(D(fake), torch.ones(B, 1))   # G wants D fooled
g_loss.backward()                          # flows through D into G
g_opt.step()                               # …but only G's params update`,
cap:'Forgetting .detach() in the D step trains the generator to help the discriminator. A beautiful, terrible bug.'},
{h:'Diffusion: destroy, then learn to un-destroy',
p:`<p>The idea behind Stable Diffusion and friends is disarmingly simple. <strong>Forward</strong>: add Gaussian noise to an image over T steps until it's pure static — no learning involved. <strong>Reverse</strong>: train a network (usually a U-Net or transformer) to predict the noise that was added at each step. Generation = start from static, subtract predicted noise T times. The training objective is just MSE on the noise:</p>`,
code:`def diffusion_loss(model, x0, T=1000, alphas_bar=None):
    t   = torch.randint(0, T, (x0.size(0),), device=x0.device)
    eps = torch.randn_like(x0)
    ab  = alphas_bar[t].view(-1, 1, 1, 1)          # noise schedule
    x_t = ab.sqrt() * x0 + (1 - ab).sqrt() * eps   # noisy image at step t
    return F.mse_loss(model(x_t, t), eps)          # predict the noise`,
cap:'Stable training (plain MSE!), superb samples, at the price of many inference steps — the opposite trade to GANs.'},
{h:'Which one, when',
p:`<ul>
<li><strong>VAE</strong> — you want a smooth latent space: interpolation, anomaly detection, representation learning.</li>
<li><strong>GAN</strong> — fast single-pass sampling, sharp outputs, and you have the patience to babysit training.</li>
<li><strong>Diffusion</strong> — best quality and diversity today; slower sampling; the backbone of modern image/audio/video generation.</li>
</ul>`}],
widget:null,after:[
{h:'One blog to bookmark',
p:`<p>Diffusion is the backbone of today's image and video generators, and it is more approachable than its reputation suggests.</p>
<div class="whybox"><span class="g-tag">one great read</span><p>Lilian Weng's <a href="https://lilianweng.github.io/posts/2021-07-11-diffusion-models/" target="_blank" rel="noopener">"What are Diffusion Models?"</a> derives the forward-noising and reverse-denoising process cleanly from scratch — the best bridge from the plain-MSE code in this chapter to the math behind Stable Diffusion.</p></div>`}],
quiz:[
{q:'The reparameterisation trick z = μ + σ·ε exists so that…',o:['sampling is faster','gradients can flow through a random sample to the encoder','KL is computable','the decoder sees noise'],a:1,why:'Sampling is non-differentiable; rewriting it as a deterministic function of (μ, σ) plus external noise restores the gradient path.'},
{q:'In the discriminator step, fake.detach() prevents…',o:['memory leaks','generator weights being updated by the D loss','mode collapse','NaNs'],a:1,why:'Without detach, D\'s backward flows into G, optimising G to make fakes easier to catch.'},
{q:'A diffusion model is trained to predict…',o:['the clean image directly','the class label','the noise added at step t','the next pixel'],a:2,why:'The ε-prediction objective is a simple MSE — the source of diffusion\'s famously stable training.'}]},
];
